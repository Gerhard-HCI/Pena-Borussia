<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reglamento taurino · Peña Borussia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;700;800&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--rojo:#A4151F;--rojo-2:#C0202E;--rojo-dk:#7E0F18;--oro:#E0A92E;--verde:#1C7A44;
--paper:#FBF7EF;--paper-2:#F3EAD8;--card:#fff;--ink:#231a17;--ink-2:#4b3f39;--ink-3:#6f625b;--ink-4:#9a8d84;
--border:#e7dcc8;--border-2:#efe7d7;--r:18px;--r-md:12px;--sans:'Archivo',system-ui,sans-serif;--serif:'Spectral',Georgia,serif;--poster:'Anton',Impact,sans-serif;
--shadow:0 6px 20px rgba(60,30,10,.08)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5}
a{color:inherit}
#hdr{position:sticky;top:0;z-index:10;background:linear-gradient(120deg,var(--rojo) 0%,var(--rojo-2) 60%,var(--rojo-dk) 100%);color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.hdr-top{display:flex;align-items:center;gap:10px;padding:11px 14px}
.hdr-mono{width:36px;height:36px;border-radius:9px;background:#fff;padding:3px;object-fit:contain;flex-shrink:0}
.hdr-tt{flex:1;min-width:0}
.hdr-tt .t{font-weight:800;font-size:15px;letter-spacing:.3px;line-height:1.05}
.hdr-tt .s{font-size:10.5px;color:rgba(255,255,255,.82);margin-top:1px}
.panuelo{height:7px;background:repeating-linear-gradient(90deg,#fff 0 14px,#C0202E 14px 28px)}
.lang-bar{display:flex;gap:2px;padding:6px 8px;background:var(--rojo-dk);border-top:1px solid rgba(255,255,255,.12);justify-content:flex-end}
.lang-btn{font-size:19px;line-height:1;padding:6px 5px;background:none;border:none;border-bottom:3px solid transparent;opacity:.85;cursor:pointer}
.lang-btn.active{opacity:1;border-bottom-color:var(--oro);background:rgba(224,169,46,.16)}
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 40px}
.back{display:inline-flex;align-items:center;gap:7px;margin:2px 0 14px;font-weight:700;font-size:13px;color:var(--rojo-2);text-decoration:none;background:var(--card);border:1px solid var(--border-2);padding:8px 14px;border-radius:22px}
.hero{background:linear-gradient(150deg,var(--rojo) 0%,var(--rojo-dk) 100%);color:#fff;border-radius:var(--r);padding:20px 18px;margin-bottom:8px;box-shadow:var(--shadow)}
.hero h1{font-family:var(--poster);font-size:clamp(30px,9vw,46px);line-height:.98;letter-spacing:.5px;text-transform:uppercase;margin:0}
.hero .sub{font-family:var(--serif);font-style:italic;font-size:15px;color:rgba(255,255,255,.9);margin-top:8px}
.grp{font-family:var(--poster);font-size:13px;letter-spacing:1.6px;text-transform:uppercase;color:var(--rojo-2);margin:22px 2px 9px;display:flex;align-items:center;gap:9px}
.grp::after{content:"";flex:1;height:2px;background:linear-gradient(90deg,var(--oro),transparent)}
.card{background:var(--card);border:1px solid var(--border-2);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 16px;margin-bottom:12px}
.card h2{display:flex;align-items:center;gap:10px;font-family:var(--poster);font-size:19px;letter-spacing:.4px;text-transform:uppercase;color:var(--ink);margin:0 0 8px;line-height:1.1}
.card h2 .ic{font-size:20px;flex-shrink:0}
.card .bd{font-size:14px;line-height:1.62;color:var(--ink-2)}
.card .bd b{color:var(--ink);font-weight:700}
.src-card{background:var(--paper-2);border:1px solid var(--border)}
.src-card h2{font-size:15px}
.src-list{list-style:none;margin:0;padding:0}
.src-list li{padding:8px 0;border-bottom:1px solid var(--border-2);font-size:12.5px;line-height:1.5}
.src-list li:last-child{border-bottom:none}
.src-list a{color:var(--rojo-2);font-weight:600;text-decoration:none}
.src-list a::after{content:" ↗";font-size:10px;color:var(--ink-4)}
.note{font-size:12px;color:var(--ink-4);line-height:1.55;background:var(--paper-2);border:1px solid var(--border-2);border-radius:var(--r-md);padding:11px 13px;margin-top:12px}
.foot{text-align:center;color:var(--ink-4);font-size:11px;margin-top:20px}
</style>
</head>

された条文が優先します。"}}, SEC=[{"g": 1, "icon": "📜", "title": {"es": "De dónde viene la norma", "de": "Woher die Regeln kommen", "en": "Where the rules come from", "ru": "Откуда взялись правила", "ja": "規則の由来"}, "body": {"es": "La regulación del toreo en España es muy antigua: la propia <b>Ley 18/2013</b> recuerda que ya las <b>Partidas de Alfonso X el Sabio</b>, en el siglo XIII, se ocupaban de esta materia. Durante buena parte del siglo XX rigió el reglamento taurino de <b>1962</b>. Con la Constitución de 1978 y el traspaso de competencias sobre espectáculos públicos a las Comunidades Autónomas, todo el sistema tuvo que rehacerse: primero con una <b>ley marco</b> estatal (1991), después con un <b>reglamento</b> que la desarrollara (1992, sustituido en 1996), y en paralelo con <b>reglamentos autonómicos</b> propios — entre ellos el de Navarra, que es el que se aplica en Pamplona.", "de": "Die Regulierung des Stierkampfs in Spanien ist sehr alt: Das <b>Gesetz 18/2013</b> erinnert daran, dass bereits die <b>Partidas Alfons X. des Weisen</b> im 13. Jahrhundert diese Materie behandelten. Einen Großteil des 20. Jahrhunderts galt das Stierkampfreglement von <b>1962</b>. Mit der Verfassung von 1978 und der Übertragung der Zuständigkeit für öffentliche Veranstaltungen auf die Autonomen Gemeinschaften musste das ganze System neu gebaut werden: zuerst ein staatliches <b>Rahmengesetz</b> (1991), dann ein <b>Reglement</b> zu dessen Ausführung (1992, 1996 ersetzt) und parallel eigene <b>regionale Reglements</b> — darunter das navarresische, das in Pamplona gilt.", "en": "Regulating bullfighting in Spain is nothing new: <b>Law 18/2013</b> itself recalls that the <b>Partidas of Alfonso X the Wise</b> already dealt with the matter in the 13th century. For much of the 20th century the <b>1962</b> bullfighting regulation applied. With the 1978 Constitution and the transfer of powers over public events to the autonomous regions, the whole system had to be rebuilt: first a state <b>framework law</b> (1991), then a <b>regulation</b> developing it (1992, replaced in 1996), and in parallel the regions' own <b>regulations</b> — including Navarra's, which is the one that applies in Pamplona.", "ru": "Регулирование корриды в Испании очень старое: сам <b>Закон 18/2013</b> напоминает, что уже <b>«Партиды» Альфонсо X Мудрого</b> в XIII веке касались этой материи. Бóльшую часть XX века действовал регламент <b>1962</b> года. С Конституцией 1978 года и передачей полномочий по публичным зрелищам автономным сообществам всю систему пришлось перестроить: сначала государственный <b>рамочный закон</b> (1991), затем <b>регламент</b> к нему (1992, заменён в 1996), и параллельно собственные <b>региональные регламенты</b> — включая наваррский, который и действует в Памплоне.", "ja": "スペインの闘牛規制は非常に古く、<b>2013年法18号</b>自身が、13世紀の<b>アルフォンソ10世（賢王）の『七部法典』</b>が既にこの問題を扱っていたと述べています。20世紀の大半は<b>1962年</b>の闘牛規則が適用されました。1978年憲法と、公開興行に関する権限の自治州への移管により、制度全体の再構築が必要になりました——まず国の<b>基本法</b>（1991年）、次にそれを具体化する<b>規則</b>（1992年、1996年に差し替え）、並行して各自治州独自の<b>規則</b>——そのひとつがナバラのもので、パンプローナではこれが適用されます。"}}, {"g": 1, "icon": "⚖️", "title": {"es": "Ley 10/1991 · la ley marco", "de": "Gesetz 10/1991 · das Rahmengesetz", "en": "Law 10/1991 · the framework law", "ru": "Закон 10/1991 · рамочный закон", "ja": "1991年法10号 · 基本法"}, "body": {"es": "La <b>Ley 10/1991, de 4 de abril, sobre potestades administrativas en materia de espectáculos taurinos</b> es la pieza que adapta el régimen jurídico de la fiesta a la Constitución. Fija qué puede hacer la Administración (autorizar, inspeccionar, sancionar), crea el marco de los registros y de la <b>Comisión Consultiva Nacional de Asuntos Taurinos</b>, y establece el <b>régimen sancionador</b>. No entra en el detalle de la lidia: para eso remite a un reglamento de desarrollo.", "de": "Das <b>Gesetz 10/1991 vom 4. April über Verwaltungsbefugnisse bei Stierkampfveranstaltungen</b> passt die Rechtsordnung der Fiesta an die Verfassung an. Es legt fest, was die Verwaltung darf (genehmigen, kontrollieren, sanktionieren), schafft den Rahmen für die Register und die <b>Nationale Beratungskommission für Stierkampfangelegenheiten</b> und regelt das <b>Sanktionsregime</b>. Die Einzelheiten der Lidia behandelt es nicht — dafür verweist es auf ein Ausführungsreglement.", "en": "<b>Law 10/1991 of 4 April, on administrative powers in bullfighting matters</b>, is the piece that brought the fiesta's legal regime into line with the Constitution. It sets out what the administration may do (authorise, inspect, penalise), creates the framework for the registers and for the <b>National Advisory Commission on Bullfighting Affairs</b>, and establishes the <b>penalty regime</b>. It does not go into the detail of the lidia: for that it refers to an implementing regulation.", "ru": "<b>Закон 10/1991 от 4 апреля об административных полномочиях в сфере корридных зрелищ</b> — акт, приведший правовой режим фиесты в соответствие с Конституцией. Он определяет, что вправе делать администрация (разрешать, проверять, наказывать), создаёт основу для реестров и <b>Национальной консультативной комиссии по делам корриды</b> и устанавливает <b>режим санкций</b>. В детали лидии он не входит — для этого отсылает к подзаконному регламенту.", "ja": "<b>1991年4月4日法10号（闘牛興行に関する行政権限法）</b>は、祭りの法的枠組みを憲法に適合させた法律です。行政が何をできるか（許可・監督・制裁）を定め、各種登録簿と<b>全国闘牛諮問委員会</b>の枠組みを設け、<b>制裁制度</b>を規定します。闘牛の細部には立ち入らず、それは施行規則に委ねています。"}}, {"g": 1, "icon": "🏛️", "title": {"es": "Real Decreto 145/1996 · el reglamento estatal", "de": "Königliches Dekret 145/1996 · das staatliche Reglement", "en": "Royal Decree 145/1996 · the state regulation", "ru": "Королевский декрет 145/1996 · государственный регламент", "ja": "1996年勅令145号 · 国の規則"}, "body": {"es": "El <b>Real Decreto 145/1996, de 2 de febrero</b> (BOE de 2 de marzo de 1996) aprueba el <b>Reglamento de Espectáculos Taurinos</b> hoy vigente en el ámbito estatal, sustituyendo al Real Decreto 176/1992. El propio preámbulo explica el motivo principal de la reforma: <b>erradicar el fraude en la integridad de las astas</b> —el afeitado—, siguiendo una moción aprobada por el Senado el 16 de noviembre de 1994. Fue propuesto por el Ministro de Justicia e Interior y sancionado por el Rey; después se modificó por el Real Decreto 1034/2001. Reconoce con honestidad su propio límite: la esencia del espectáculo, la lidia, no puede reglamentarse en todas sus secuencias, porque obedece a criterios artísticos y no administrativos.", "de": "Das <b>Königliche Dekret 145/1996 vom 2. Februar</b> (BOE vom 2. März 1996) verabschiedet das heute auf staatlicher Ebene geltende <b>Reglement für Stierkampfveranstaltungen</b> und ersetzt das Königliche Dekret 176/1992. Die Präambel nennt den Hauptgrund der Reform: <b>die Ausrottung des Betrugs an der Unversehrtheit der Hörner</b> — das Afeitado —, gemäß einer vom Senat am 16. November 1994 beschlossenen Entschließung. Vorgeschlagen vom Justiz- und Innenminister, sanktioniert vom König; später geändert durch das Königliche Dekret 1034/2001. Es benennt ehrlich seine eigene Grenze: Das Wesen des Spektakels, die Lidia, lässt sich nicht in allen Sequenzen verordnen, denn sie folgt künstlerischen, nicht administrativen Kriterien.", "en": "<b>Royal Decree 145/1996 of 2 February</b> (published in the BOE on 2 March 1996) approves the <b>Regulation of Bullfighting Events</b> in force today at state level, replacing Royal Decree 176/1992. Its own preamble explains the main reason for the reform: <b>eradicating fraud over the integrity of the horns</b> — the practice of shaving them — following a motion approved by the Senate on 16 November 1994. It was proposed by the Minister of Justice and the Interior and signed by the King; it was later amended by Royal Decree 1034/2001. It candidly admits its own limit: the essence of the spectacle, the lidia, cannot be regulated in every sequence, because it answers to artistic rather than administrative criteria.", "ru": "<b>Королевский декрет 145/1996 от 2 февраля</b> (BOE от 2 марта 1996) утверждает действующий сегодня на государственном уровне <b>Регламент корридных зрелищ</b>, заменив Королевский декрет 176/1992. Его преамбула объясняет главную причину реформы: <b>искоренение мошенничества с целостностью рогов</b> — их подпиливания — во исполнение резолюции Сената от 16 ноября 1994 года. Он был предложен министром юстиции и внутренних дел и подписан королём; позже изменён Королевским декретом 1034/2001. Он честно признаёт собственный предел: суть зрелища — лидия — не поддаётся регламентации во всех её последовательностях, ибо подчиняется художественным, а не административным критериям.", "ja": "<b>1996年2月2日勅令145号</b>（1996年3月2日付 BOE 公示）は、国レベルで現在有効な<b>闘牛興行規則</b>を承認し、1992年勅令176号を置き換えました。前文が改正の主因を説明しています——<b>角の完全性をめぐる不正（角削り）の根絶</b>で、1994年11月16日に上院で可決された動議に基づくものです。法務内務大臣の提案により国王が裁可し、後に2001年勅令1034号で改正されました。規則は自らの限界も率直に認めています——興行の本質である闘牛は、行政の規範ではなく芸術的基準に従うため、その全過程を細かく規定することはできない、と。"}}, {"g": 1, "icon": "📚", "title": {"es": "Qué contiene el reglamento estatal", "de": "Was das staatliche Reglement enthält", "en": "What the state regulation contains", "ru": "Что содержит государственный регламент", "ja": "国の規則の内容"}, "body": {"es": "El texto se organiza en diez títulos. Regula los <b>registros</b> (el General de Profesionales Taurinos y el de Empresas Ganaderas de Reses de Lidia); las <b>plazas de toros</b> y sus condiciones; las <b>clases de espectáculos</b> y su autorización; los <b>derechos y obligaciones de los espectadores</b>; la <b>presidencia</b>; las <b>garantías de integridad</b> (características de las reses, transporte, reconocimientos veterinarios); el <b>desarrollo del festejo</b>; las <b>escuelas taurinas</b>; la <b>Comisión Consultiva Nacional</b>; y el <b>régimen sancionador</b>. Para inscribir una ganadería se exige un mínimo de <b>25 hembras reproductoras y al menos un semental</b> inscritos en el Libro Genealógico de la Raza Bovina de Lidia: ninguna res puede lidiarse si su ganadería no está registrada.", "de": "Der Text gliedert sich in zehn Titel. Er regelt die <b>Register</b> (das Allgemeine Register der Stierkampfprofis und das der Zuchtbetriebe für Kampfrinder); die <b>Arenen</b> und ihre Bedingungen; die <b>Arten von Veranstaltungen</b> und ihre Genehmigung; die <b>Rechte und Pflichten der Zuschauer</b>; die <b>Präsidentschaft</b>; die <b>Integritätsgarantien</b> (Merkmale der Tiere, Transport, tierärztliche Untersuchungen); den <b>Ablauf des Festes</b>; die <b>Stierkampfschulen</b>; die <b>Nationale Beratungskommission</b>; und das <b>Sanktionsregime</b>. Für die Eintragung einer Zucht sind mindestens <b>25 Zuchtkühe und ein Deckbulle</b> im Zuchtbuch der Kampfrinderrasse erforderlich: Kein Tier darf bekämpft werden, wenn seine Zucht nicht registriert ist.", "en": "The text is organised into ten titles. It regulates the <b>registers</b> (the General Register of Bullfighting Professionals and that of Fighting-Bull Breeding Companies); the <b>bullrings</b> and their requirements; the <b>classes of event</b> and their authorisation; the <b>rights and duties of spectators</b>; the <b>presidency</b>; the <b>guarantees of integrity</b> (the animals' characteristics, transport, veterinary inspections); the <b>conduct of the event</b>; the <b>bullfighting schools</b>; the <b>National Advisory Commission</b>; and the <b>penalty regime</b>. To register a ranch, a minimum of <b>25 breeding females and at least one stud bull</b> entered in the Herd Book of the Fighting Bovine Breed is required: no animal may be fought if its ranch is not registered.", "ru": "Текст разделён на десять титулов. Он регулирует <b>реестры</b> (Общий реестр профессионалов корриды и реестр хозяйств, разводящих боевых быков); <b>арены</b> и требования к ним; <b>виды зрелищ</b> и их разрешение; <b>права и обязанности зрителей</b>; <b>президиум</b>; <b>гарантии целостности</b> (характеристики животных, перевозка, ветеринарные осмотры); <b>ход праздника</b>; <b>школы корриды</b>; <b>Национальную консультативную комиссию</b>; и <b>режим санкций</b>. Для регистрации хозяйства требуется минимум <b>25 маток и хотя бы один производитель</b>, внесённые в племенную книгу боевой породы: ни одно животное не может выйти на арену, если его хозяйство не зарегистрировано.", "ja": "条文は10の編で構成されます。<b>登録簿</b>（闘牛職業人一般登録簿と闘牛飼育企業登録簿）、<b>闘牛場</b>とその要件、<b>興行の種類</b>と許可、<b>観客の権利と義務</b>、<b>議長職</b>、<b>完全性の保証</b>（牛の特性・輸送・獣医検査）、<b>興行の進行</b>、<b>闘牛学校</b>、<b>全国諮問委員会</b>、<b>制裁制度</b>を規律します。牧場を登録するには、闘牛種牛の血統登録簿に記載された<b>繁殖用雌25頭以上と種牛1頭以上</b>が必要で、登録のない牧場の牛は闘牛に出せません。"}}, {"g": 1, "icon": "🎭", "title": {"es": "Ley 18/2013 · la tauromaquia como patrimonio", "de": "Gesetz 18/2013 · Tauromaquia als Kulturerbe", "en": "Law 18/2013 · bullfighting as heritage", "ru": "Закон 18/2013 · тавромахия как наследие", "ja": "2013年法18号 · 文化遺産としての闘牛"}, "body": {"es": "La <b>Ley 18/2013, de 12 de noviembre</b> declara la <b>Tauromaquia patrimonio cultural</b> digno de protección en todo el territorio nacional. Define la Tauromaquia como el conjunto de conocimientos y actividades artísticas, creativas y productivas —incluida la cría y selección del toro de lidia— que confluyen en la corrida moderna y en el arte de lidiar. Invoca los artículos <b>44, 46 y 149.2 de la Constitución</b> y obliga a todos los poderes públicos a garantizar su conservación. Es la base jurídica que los defensores del toreo esgrimen frente a las prohibiciones, y la razón de que existan planes de fomento estatales.", "de": "Das <b>Gesetz 18/2013 vom 12. November</b> erklärt die <b>Tauromaquia zum Kulturerbe</b>, das im gesamten Staatsgebiet schutzwürdig ist. Es definiert sie als die Gesamtheit der Kenntnisse und künstlerischen, kreativen und produktiven Tätigkeiten — einschließlich Zucht und Selektion des Kampfstiers —, die in der modernen Corrida und der Kunst des Lidiar zusammenlaufen. Es beruft sich auf die Artikel <b>44, 46 und 149.2 der Verfassung</b> und verpflichtet alle öffentlichen Gewalten zu ihrer Erhaltung. Es ist die Rechtsgrundlage, die Befürworter gegen Verbote anführen, und der Grund für staatliche Förderpläne.", "en": "<b>Law 18/2013 of 12 November</b> declares <b>bullfighting cultural heritage</b> worthy of protection throughout the country. It defines Tauromaquia as the body of knowledge and artistic, creative and productive activities — including the breeding and selection of the fighting bull — that come together in the modern corrida and the art of the lidia. It invokes articles <b>44, 46 and 149.2 of the Constitution</b> and obliges all public authorities to guarantee its conservation. It is the legal basis defenders cite against bans, and the reason state promotion plans exist.", "ru": "<b>Закон 18/2013 от 12 ноября</b> объявляет <b>тавромахию культурным наследием</b>, достойным защиты на всей территории страны. Он определяет тавромахию как совокупность знаний и художественных, творческих и производственных занятий — включая разведение и отбор боевого быка, — сходящихся в современной корриде и искусстве лидии. Он ссылается на статьи <b>44, 46 и 149.2 Конституции</b> и обязывает все органы власти обеспечивать её сохранение. Это правовая основа, на которую ссылаются защитники корриды против запретов, и причина существования государственных планов поддержки.", "ja": "<b>2013年11月12日法18号</b>は、<b>闘牛（タウロマキア）を文化遺産</b>と宣言し、全国土で保護に値するものとしました。タウロマキアを、闘牛牛の飼育・選抜を含む知識と芸術的・創造的・生産的活動の総体で、近代の闘牛と闘技の芸術に結実するもの、と定義します。<b>憲法44条・46条・149条2項</b>を援用し、すべての公権力にその保全を義務づけます。擁護派が禁止に対して掲げる法的根拠であり、国の振興計画が存在する理由でもあります。"}}, {"g": 1, "icon": "🔴", "title": {"es": "Navarra y Pamplona · la norma que de verdad se aplica", "de": "Navarra & Pamplona · die tatsächlich geltende Norm", "en": "Navarra & Pamplona · the rules that actually apply", "ru": "Наварра и Памплона · нормы, которые реально действуют", "ja": "ナバラとパンプローナ · 実際に適用される規則"}, "body": {"es": "Aquí está la clave que sorprende a muchos aficionados extranjeros: <b>en Pamplona no rige el reglamento estatal, sino el navarro</b>. El artículo 44 de la <b>Ley Orgánica de Reintegración y Amejoramiento del Régimen Foral</b> atribuye a Navarra competencia <b>exclusiva</b> sobre espectáculos. En su ejercicio se aprobó la <b>Ley Foral 2/1989, de 13 de marzo</b>, y después el <b>Decreto Foral 249/1992, de 29 de junio</b>, que aprueba el <b>Reglamento de Espectáculos Taurinos de Navarra</b> (BON de 4 de julio de 1992). Ese reglamento refundió normas propias y estatales, con las modificaciones exigidas —dice su preámbulo— por las <b>especiales circunstancias y tradiciones propias</b> de Navarra. El reglamento estatal se aplica sólo como <b>derecho supletorio</b>, en lo no previsto por el navarro.", "de": "Hier der Punkt, der viele ausländische Aficionados überrascht: <b>In Pamplona gilt nicht das staatliche, sondern das navarresische Reglement</b>. Artikel 44 des <b>Organgesetzes über die Wiedereingliederung und Verbesserung der Foralordnung</b> weist Navarra die <b>ausschließliche</b> Zuständigkeit für Veranstaltungen zu. In deren Ausübung wurden das <b>Foralgesetz 2/1989 vom 13. März</b> und danach das <b>Foraldekret 249/1992 vom 29. Juni</b> erlassen, das das <b>Reglement für Stierkampfveranstaltungen Navarras</b> verabschiedet (BON vom 4. Juli 1992). Dieses Reglement führte eigene und staatliche Normen zusammen, mit den — so die Präambel — durch die <b>besonderen Umstände und eigenen Traditionen</b> Navarras gebotenen Änderungen. Das staatliche Reglement gilt nur als <b>subsidiäres Recht</b>, soweit das navarresische schweigt.", "en": "Here is the point that surprises many foreign aficionados: <b>Pamplona is not governed by the state regulation but by Navarra's own</b>. Article 44 of the <b>Organic Law on the Reintegration and Improvement of the Foral Regime</b> gives Navarra <b>exclusive</b> competence over public events. Exercising it, Navarra passed <b>Foral Law 2/1989 of 13 March</b> and then <b>Foral Decree 249/1992 of 29 June</b>, approving the <b>Regulation of Bullfighting Events of Navarra</b> (BON of 4 July 1992). That regulation merged its own and state rules, with the changes required — as its preamble puts it — by Navarra's <b>special circumstances and own traditions</b>. The state regulation applies only as <b>supplementary law</b>, where the Navarran one is silent.", "ru": "Вот момент, удивляющий многих иностранных любителей: <b>в Памплоне действует не государственный регламент, а наваррский</b>. Статья 44 <b>Органического закона о восстановлении и улучшении фуэросного режима</b> закрепляет за Наваррой <b>исключительную</b> компетенцию в сфере зрелищ. В её осуществление были приняты <b>Фуэросный закон 2/1989 от 13 марта</b>, а затем <b>Фуэросный декрет 249/1992 от 29 июня</b>, утвердивший <b>Регламент корридных зрелищ Наварры</b> (BON от 4 июля 1992). Этот регламент свёл воедино собственные и государственные нормы с изменениями, продиктованными — как гласит преамбула — <b>особыми обстоятельствами и традициями</b> Наварры. Государственный регламент применяется лишь как <b>субсидиарное право</b>, там, где наваррский молчит.", "ja": "多くの外国の愛好家が驚く点がここです——<b>パンプローナで適用されるのは国の規則ではなく、ナバラ独自の規則</b>です。<b>フエロ制度の復権・改善に関する組織法</b>44条が、興行についてナバラに<b>排他的</b>権限を与えています。その行使として<b>1989年3月13日フエロ法2号</b>、次いで<b>1992年6月29日フエロ令249号</b>が制定され、<b>ナバラ闘牛興行規則</b>が承認されました（1992年7月4日付 BON）。同規則は独自規範と国の規範を統合し、前文いわく、ナバラの<b>特別な事情と固有の伝統</b>が要請する修正を加えています。国の規則は、ナバラの規則に定めのない事項についてのみ<b>補充法</b>として適用されます。"}}, {"g": 1, "icon": "🏃", "title": {"es": "El encierro · ordenanza municipal", "de": "Der Encierro · städtische Verordnung", "en": "The encierro · municipal ordinance", "ru": "Энсьерро · муниципальный регламент", "ja": "牛追い · 市条例"}, "body": {"es": "El encierro tiene además su propia <b>ordenanza del Ayuntamiento de Pamplona</b>, que se aplica junto al Decreto Foral 249/1992. Fija el <b>recorrido</b> —corrales de Santo Domingo, Plaza Consistorial, Mercaderes y Estafeta, hasta los corrales de la plaza—, la hora (<b>todos los encierros comienzan a las 8:00</b>, salvo fuerza mayor) y los cohetes que marcan la apertura de los corrales y la salida del último toro. Prohíbe correr a los <b>menores de 18 años</b>, cierra el acceso al recorrido a las <b>07:30</b> —los mandos policiales pueden cerrarlo antes si ya hay corredores suficientes— y tipifica infracciones leves, graves y muy graves conforme a la Ley Foral 2/1989.", "de": "Der Encierro hat zudem eine eigene <b>Verordnung der Stadt Pamplona</b>, die neben dem Foraldekret 249/1992 gilt. Sie legt die <b>Strecke</b> fest — Gehege von Santo Domingo, Plaza Consistorial, Mercaderes und Estafeta bis zu den Gehegen der Arena —, die Uhrzeit (<b>alle Encierros beginnen um 8:00</b>, außer bei höherer Gewalt) und die Raketen, die das Öffnen der Gehege und den Austritt des letzten Stiers anzeigen. Sie verbietet <b>unter 18-Jährigen</b> das Mitlaufen, schließt den Zugang zur Strecke um <b>07:30</b> — die Polizeiführung kann früher schließen, wenn genug Läufer da sind — und stuft leichte, schwere und sehr schwere Verstöße gemäß Foralgesetz 2/1989 ein.", "en": "The encierro also has its own <b>Pamplona city ordinance</b>, applied alongside Foral Decree 249/1992. It fixes the <b>route</b> — the Santo Domingo corrals, Plaza Consistorial, Mercaderes and Estafeta, through to the ring's corrals — the time (<b>every encierro starts at 8:00</b>, barring force majeure) and the rockets marking the opening of the corrals and the exit of the last bull. It bars <b>under-18s</b> from running, closes access to the route at <b>07:30</b> — police commanders may close it earlier if there are already enough runners — and classifies minor, serious and very serious offences under Foral Law 2/1989.", "ru": "У энсьерро есть и собственный <b>регламент мэрии Памплоны</b>, применяемый наряду с Фуэросным декретом 249/1992. Он закрепляет <b>маршрут</b> — загоны Санто-Доминго, Пласа-Консисториаль, Меркадерес и Эстафета до загонов арены, — время (<b>все энсьерро начинаются в 8:00</b>, кроме форс-мажора) и ракеты, отмечающие открытие загонов и выход последнего быка. Он запрещает бежать <b>лицам младше 18 лет</b>, закрывает доступ на маршрут в <b>07:30</b> — полицейское начальство может закрыть и раньше, если бегущих уже достаточно — и квалифицирует лёгкие, тяжкие и особо тяжкие нарушения согласно Фуэросному закону 2/1989.", "ja": "牛追いには、フエロ令249号（1992年）と併せて適用される<b>パンプローナ市の条例</b>もあります。<b>コース</b>（サント・ドミンゴの囲い、市庁舎前広場、メルカデレス、エスタフェタを経て闘牛場の囲いへ）、時刻（不可抗力を除き<b>すべての牛追いは8:00開始</b>）、囲いの扉が開いたことと最後の牛が出たことを知らせる花火を定めます。<b>18歳未満</b>の参加を禁じ、コースへの入場は<b>07:30</b>で締切——走者が十分なら警察指揮官はそれ以前に閉鎖できます——また、フエロ法2/1989に従い軽微・重大・極めて重大な違反を分類します。"}}, {"g": 2, "icon": "🐂", "title": {"es": "El toro", "de": "Der Stier", "en": "The bull", "ru": "Бык", "ja": "牛"}, "body": {"es": "El toro de lidia debe tener entre <b>4 y 6 años</b> y cumplir un peso mínimo según la categoría de la plaza (en Pamplona, plaza de primera, se ven toros de gran trapío, muy por encima de los 500 kg). Debe proceder de una <b>ganadería inscrita</b> en el registro correspondiente y estar identificado. Cada tarde se lidian <b>seis toros</b> de una misma ganadería, con dos <b>sobreros</b> de reserva —que pueden ser de otro hierro, como se ve en algunas reseñas de la feria— por si una res se inutiliza o es devuelta.", "de": "Der Kampfstier muss <b>4 bis 6 Jahre</b> alt sein und ein Mindestgewicht je nach Arenakategorie erfüllen (in Pamplona, einer Arena erster Kategorie, sieht man Stiere von großem Trapío, weit über 500 kg). Er muss aus einer <b>eingetragenen Zucht</b> stammen und identifiziert sein. Pro Nachmittag werden <b>sechs Stiere</b> einer Zucht bekämpft, mit zwei <b>Sobreros</b> als Reserve — die auch von einem anderen Eisen sein können, wie manche Reseñas der Feria zeigen —, falls ein Tier ausfällt oder zurückgewiesen wird.", "en": "The fighting bull must be <b>4 to 6 years</b> old and meet a minimum weight according to the ring's category (in Pamplona, a first-category ring, the bulls have great presence, well above 500 kg). It must come from a <b>registered ranch</b> and be identified. Each afternoon <b>six bulls</b> from one ranch are fought, with two <b>sobreros</b> in reserve — which may carry a different brand, as some of the feria's reseñas show — in case an animal is disabled or returned.", "ru": "Боевой бык должен быть в возрасте <b>4–6 лет</b> и отвечать минимальному весу по категории арены (в Памплоне, арене первой категории, быки внушительного вида, заметно тяжелее 500 кг). Он должен происходить из <b>зарегистрированного хозяйства</b> и быть идентифицирован. Каждый вечер сражаются <b>шесть быков</b> одного хозяйства и два запасных <b>собреро</b> — возможно, с другим клеймом, как видно в некоторых резеньях ферии, — на случай, если животное выбывает или его возвращают.", "ja": "闘牛は<b>4〜6歳</b>で、闘牛場の等級に応じた最低体重を満たす必要があります（一級闘牛場のパンプローナでは、500kgを大きく超える風格ある牛が見られます）。<b>登録された牧場</b>の出身で、個体識別されていなければなりません。毎午後、同一牧場の<b>6頭</b>が戦い、予備の<b>ソブレロ</b>が2頭——フェリアの公式リストに見られるように別の焼き印の場合もあります——牛が戦えなくなる、または差し戻された場合に備えます。"}}, {"g": 2, "icon": "🩺", "title": {"es": "Los reconocimientos", "de": "Die Untersuchungen", "en": "The inspections", "ru": "Осмотры", "ja": "検査"}, "body": {"es": "Antes de la corrida, los <b>veterinarios</b> reconocen a las reses: comprueban edad, peso, sanidad, defensas y <b>la integridad de las astas</b>, el punto que motivó la reforma de 1996. Si un toro no reúne las condiciones, es <b>rechazado</b> y sustituido por un sobrero. Tras la lidia se practica un reconocimiento <b>post mortem</b> de las astas, cuyo resultado puede dar lugar a sanciones para la ganadería. El veterinario de servicio asesora además a la presidencia durante el festejo.", "de": "Vor der Corrida untersuchen <b>Tierärzte</b> die Tiere: Alter, Gewicht, Gesundheit, Verteidigung und <b>die Unversehrtheit der Hörner</b> — jener Punkt, der die Reform von 1996 auslöste. Erfüllt ein Stier die Bedingungen nicht, wird er <b>zurückgewiesen</b> und durch einen Sobrero ersetzt. Nach der Lidia erfolgt eine <b>Post-mortem</b>-Untersuchung der Hörner, deren Ergebnis Sanktionen für die Zucht nach sich ziehen kann. Der diensthabende Tierarzt berät zudem die Präsidentschaft während der Veranstaltung.", "en": "Before the corrida, <b>vets</b> inspect the animals: age, weight, health, defences and <b>the integrity of the horns</b> — the very point that prompted the 1996 reform. If a bull fails to meet the conditions it is <b>rejected</b> and replaced by a sobrero. After the lidia a <b>post-mortem</b> examination of the horns is carried out, and its findings can lead to penalties for the ranch. The duty vet also advises the president during the event.", "ru": "Перед корридой <b>ветеринары</b> осматривают животных: возраст, вес, здоровье, «защиту» и <b>целостность рогов</b> — именно тот пункт, что вызвал реформу 1996 года. Если бык не отвечает условиям, его <b>отклоняют</b> и заменяют собреро. После лидии проводится <b>посмертный</b> осмотр рогов, результаты которого могут повлечь санкции для хозяйства. Дежурный ветеринар также консультирует президиум во время праздника.", "ja": "闘牛の前に<b>獣医</b>が牛を検査します——年齢、体重、健康、角や防御、そして<b>角の完全性</b>。これこそ1996年改正の動機でした。条件を満たさない牛は<b>差し戻され</b>、ソブレロと交代します。闘牛後には角の<b>死後検査</b>が行われ、その結果によって牧場に制裁が科されることもあります。当番の獣医は興行中、議長への助言も行います。"}}, {"g": 2, "icon": "🎲", "title": {"es": "El apartado y el sorteo", "de": "Apartado und Auslosung", "en": "The apartado and the draw", "ru": "Апартадо и жеребьёвка", "ja": "アパルタードと抽選"}, "body": {"es": "A mediodía —en Pamplona, a las <b>13:00 h</b>, con apertura al público a las 12:15— se celebra el <b>sorteo</b>: los representantes de los matadores emparejan los toros en tres lotes de dos, procurando equilibrio, y se sortean entre las cuadrillas. Después viene el <b>apartado</b> propiamente dicho: los toros se encierran de uno en uno en los <b>chiqueros</b>, en el orden en que saldrán por la tarde. Es un rito madrugador muy del gusto del aficionado, y en Pamplona se puede presenciar con entrada.", "de": "Mittags — in Pamplona um <b>13:00 Uhr</b>, Einlass ab 12:15 — findet die <b>Auslosung</b> statt: Die Vertreter der Matadore bilden aus den Stieren drei ausgewogene Zweierlose, die unter den Cuadrillas verlost werden. Danach folgt das eigentliche <b>Apartado</b>: Die Stiere werden einzeln in die <b>Chiqueros</b> gesperrt, in der Reihenfolge ihres Auftritts am Nachmittag. Ein frühes Ritual ganz nach dem Geschmack der Aficionados; in Pamplona ist es mit Eintrittskarte zu sehen.", "en": "At midday — in Pamplona at <b>13:00</b>, with doors from 12:15 — comes the <b>draw</b>: the matadors' representatives pair the bulls into three balanced lots of two, which are then drawn among the cuadrillas. Then comes the <b>apartado</b> proper: the bulls are penned one by one into the <b>chiqueros</b>, in the order they will appear that afternoon. It is an early ritual much to the aficionado's taste, and in Pamplona you can watch it with a ticket.", "ru": "В полдень — в Памплоне в <b>13:00</b>, с открытием дверей в 12:15 — проходит <b>жеребьёвка</b>: представители матадоров разбивают быков на три сбалансированные пары, которые разыгрываются между куадрильями. Затем следует собственно <b>апартадо</b>: быков по одному запирают в <b>чикеро</b> в том порядке, в каком они выйдут вечером. Это ранний ритуал, очень любимый знатоками; в Памплоне на него можно попасть по билету.", "ja": "正午——パンプローナでは<b>13:00</b>（開場12:15）——に<b>抽選</b>が行われます。闘牛士の代理人が牛を均衡のとれた2頭ずつ3組に分け、クアドリーリャ間で抽選します。続いて本来の<b>アパルタード</b>：牛は午後に登場する順に、1頭ずつ<b>チケーロ</b>に入れられます。愛好家好みの早い時間の儀式で、パンプローナでは入場券で観覧できます。"}}, {"g": 2, "icon": "🎺", "title": {"es": "El paseíllo", "de": "Der Paseíllo", "en": "The paseíllo", "ru": "Пасейльо", "ja": "パセイーリョ"}, "body": {"es": "A las <b>18:30 h</b>, al toque de clarines, se abre el festejo con el <b>paseíllo</b>: desfilan los <b>alguacilillos</b> a caballo, los tres <b>matadores</b> por antigüedad —el más antiguo a la izquierda, el más moderno en el centro—, sus <b>cuadrillas</b> y los servicios de plaza (monosabios y mulillas). El alguacilillo pide simbólicamente la llave del chiquero a la presidencia. A partir de ahí, el festejo se desarrolla bajo la autoridad del palco.", "de": "Um <b>18:30 Uhr</b> eröffnet der <b>Paseíllo</b> mit Trompetenklang das Fest: Es defilieren die berittenen <b>Alguacilillos</b>, die drei <b>Matadore</b> nach Anciennität — der Älteste links, der Jüngste in der Mitte —, ihre <b>Cuadrillas</b> und die Arenadienste (Monosabios und Maultiergespanne). Der Alguacilillo erbittet symbolisch den Schlüssel zum Chiquero von der Präsidentschaft. Von da an läuft das Fest unter der Autorität der Loge.", "en": "At <b>18:30</b>, to a trumpet call, the <b>paseíllo</b> opens the event: the mounted <b>alguacilillos</b> parade, the three <b>matadors</b> by seniority — the most senior on the left, the most junior in the centre — their <b>cuadrillas</b> and the ring services (monosabios and mule teams). The alguacilillo symbolically asks the president for the key to the chiquero. From then on the event unfolds under the box's authority.", "ru": "В <b>18:30</b> под звуки труб праздник открывает <b>пасейльо</b>: проходят конные <b>альгвасильо</b>, три <b>матадора</b> по старшинству — старший слева, младший в центре, — их <b>куадрильи</b> и служба арены (моносабио и упряжки мулов). Альгвасильо символически просит у президиума ключ от чикеро. Дальше праздник идёт под властью ложи.", "ja": "<b>18:30</b>、ラッパの合図で<b>パセイーリョ</b>が幕を開けます。騎馬の<b>アルグアシリーリョ</b>、先任順の3人の<b>マタドール</b>（最年長が左、最も新しい者が中央）、その<b>クアドリーリャ</b>、場内係（モノサビオと騾馬隊）が行進。アルグアシリーリョは議長にチケーロの鍵を象徴的に求めます。以後、興行は議長席の権限のもとで進みます。"}}, {"g": 2, "icon": "🐴", "title": {"es": "Primer tercio · varas", "de": "Erstes Drittel · Varas", "en": "First third · the picadors", "ru": "Первая терция · вары", "ja": "第一の段 · バラ"}, "body": {"es": "Tras recibir al toro con el <b>capote</b> (verónicas, chicuelinas), suena el clarín y entran los <b>picadores</b>. En la <b>suerte de varas</b>, el picador clava la <b>puya</b> en el morrillo: mide la bravura, comprueba si el toro empuja y corrige su embestida. El reglamento regula el número de puyazos y las características de la puya y del peto del caballo. Entre vara y vara, los matadores lucen en los <b>quites</b>. Cuando el toro es bravo, el público suele pedir que se le respete y no se le castigue de más.", "de": "Nachdem der Stier mit dem <b>Capote</b> empfangen wurde (Verónicas, Chicuelinas), ertönt das Signal und die <b>Picadores</b> reiten ein. Bei der <b>Suerte de varas</b> setzt der Picador die <b>Puya</b> in den Morrillo: Sie misst die Tapferkeit, prüft, ob der Stier schiebt, und korrigiert den Angriff. Das Reglement regelt die Zahl der Stiche sowie die Merkmale von Puya und Pferdepanzer. Zwischen den Varas glänzen die Matadore in den <b>Quites</b>. Ist der Stier tapfer, fordert das Publikum meist, ihn zu schonen.", "en": "After the bull is received with the <b>cape</b> (verónicas, chicuelinas), the trumpet sounds and the <b>picadors</b> enter. In the <b>suerte de varas</b>, the picador places the <b>lance</b> in the morrillo: it measures bravery, tests whether the bull pushes, and tempers its charge. The regulation governs the number of lances and the specifications of the lance and the horse's protective caparison. Between lances the matadors shine in the <b>quites</b>. When the bull is brave, the crowd usually asks that it be spared further punishment.", "ru": "Быка встречают <b>плащом</b> (вероники, чикуэлины), звучит труба, и въезжают <b>пикадоры</b>. В <b>суэрте-де-варас</b> пикадор вонзает <b>пику</b> в загривок: она измеряет храбрость, проверяет, давит ли бык, и умеряет его натиск. Регламент определяет число уколов и характеристики пики и защитной попоны лошади. Между уколами матадоры блистают в <b>китес</b>. Если бык храбр, публика обычно просит его поберечь.", "ja": "<b>カポーテ</b>（ベロニカ、チクエリーナ）で牛を迎えた後、ラッパが鳴り<b>ピカドール</b>が入場します。<b>スエルテ・デ・バラス</b>では、ピカドールが<b>槍</b>を肩に刺し、勇敢さを測り、牛が押すかを確かめ、突進を和らげます。規則は突きの回数、槍と馬の防護具の仕様を定めます。突きの合間にマタドールが<b>キテ</b>で技を見せます。牛が勇敢なとき、観客はたいてい労わるよう求めます。"}}, {"g": 2, "icon": "🎯", "title": {"es": "Segundo tercio · banderillas", "de": "Zweites Drittel · Banderillas", "en": "Second third · banderillas", "ru": "Вторая терция · бандерильи", "ja": "第二の段 · バンデリリャ"}, "body": {"es": "Al segundo toque, los <b>banderilleros</b> —o el propio matador, como acostumbra Manuel Escribano— clavan tres pares de <b>banderillas</b> en el morrillo, citando de frente, al quiebro o al cuarteo. Este tercio despeja y aviva al toro, corrige querencias y prepara la faena de muleta. Es de los momentos más vistosos y arriesgados, porque se ejecuta sin engaño que proteja al torero.", "de": "Beim zweiten Signal setzen die <b>Banderilleros</b> — oder der Matador selbst, wie es Manuel Escribano pflegt — drei Paar <b>Banderillas</b> in den Morrillo: frontal, al quiebro oder al cuarteo. Dieses Drittel klärt und belebt den Stier, korrigiert Querencias und bereitet die Muleta-Faena vor. Einer der spektakulärsten und riskantesten Momente, denn er wird ohne schützendes Tuch ausgeführt.", "en": "At the second trumpet, the <b>banderilleros</b> — or the matador himself, as Manuel Escribano likes to do — place three pairs of <b>banderillas</b> in the morrillo, calling the bull head-on, al quiebro or al cuarteo. This third clears and revives the bull, corrects its querencias and prepares the muleta work. One of the most spectacular and dangerous moments, since it is done with no cloth to protect the man.", "ru": "По второму сигналу <b>бандерильеро</b> — или сам матадор, как любит Мануэль Эскрибано — вонзают три пары <b>бандерилий</b> в загривок: в лоб, «аль кьебро» или «аль куартео». Эта терция проясняет и взбадривает быка, исправляет его «керенсии» и готовит работу с мулетой. Один из самых зрелищных и опасных моментов, ведь он исполняется без плаща, защищающего тореро.", "ja": "2度目の合図で、<b>バンデリリェロ</b>——あるいはマヌエル・エスクリバノのように闘牛士自身——が<b>バンデリリャ</b>を3対、正面から、あるいはキエブロやクアルテオで肩に刺します。この段は牛を整えて奮い立たせ、居場所への執着を正し、ムレタの演技を準備します。布の守りなしで行うため、最も華麗で危険な場面のひとつです。"}}, {"g": 2, "icon": "⚔️", "title": {"es": "Tercer tercio · muerte", "de": "Drittes Drittel · Tod", "en": "Third third · death", "ru": "Третья терция · смерть", "ja": "第三の段 · 仕留め"}, "body": {"es": "Es el tercio de la <b>faena de muleta</b> y la <b>estocada</b>. El matador brinda el toro —a una persona o al público—, torea con la muleta buscando <b>templar</b>, ligar series y mandar, y remata entrando a matar con el estoque, a ser posible <b>recibiendo</b> o al <b>volapié</b>. Si la estocada no basta, puede usar el <b>descabello</b>; el <b>puntillero</b> remata. La calidad de la faena y una espada certera son la base de los trofeos: sin matar bien no hay premio, por brillante que haya sido la muleta.", "de": "Das Drittel der <b>Muleta-Faena</b> und des <b>Degenstoßes</b>. Der Matador widmet den Stier — einer Person oder dem Publikum —, arbeitet mit der Muleta, sucht <b>Temple</b>, verbundene Serien und Herrschaft, und tötet mit dem Degen, möglichst <b>recibiendo</b> oder al <b>volapié</b>. Reicht der Stoß nicht, kann er den <b>Descabello</b> einsetzen; der <b>Puntillero</b> gibt den Gnadenstoß. Qualität der Faena und ein sicherer Degen sind die Grundlage der Trophäen: Ohne guten Todesstoß kein Preis, so brillant die Muleta auch war.", "en": "The third of the <b>muleta faena</b> and the <b>sword</b>. The matador dedicates the bull — to a person or to the crowd — works with the muleta seeking <b>temple</b>, linked series and command, and goes in to kill with the estoque, ideally <b>recibiendo</b> or al <b>volapié</b>. If the sword is not enough he may use the <b>descabello</b>; the <b>puntillero</b> finishes. The quality of the faena and a clean sword are the basis of the trophies: without killing well there is no prize, however brilliant the muleta.", "ru": "Терция <b>работы с мулетой</b> и <b>эстокады</b>. Матадор посвящает быка — человеку или публике, — работает мулетой, ища <b>темп</b>, связанные серии и господство, и идёт убивать эстоком, по возможности <b>ресибьендо</b> или <b>воляпие</b>. Если шпаги мало, применяет <b>дескабельо</b>; добивает <b>пунтильеро</b>. Качество фаэны и точная шпага — основа трофеев: без хорошего удара нет награды, сколь бы блестящей ни была мулета.", "ja": "<b>ムレタの演技</b>と<b>剣</b>の段。闘牛士は牛を誰か、あるいは観客に捧げ、ムレタで<b>テンプレ</b>と連続技と支配を追求し、エストケで仕留めます。理想は<b>レシビエンド</b>か<b>ボラピエ</b>。剣が足りなければ<b>デスカベリョ</b>を使い、<b>プンティリェロ</b>がとどめを刺します。演技の質と確かな剣が賞の基礎——ムレタがいかに見事でも、うまく仕留めなければ賞はありません。"}}, {"g": 2, "icon": "⏱️", "title": {"es": "Los avisos", "de": "Die Avisos", "en": "The avisos (warnings)", "ru": "Ависо (предупреждения)", "ja": "アビソ（勧告）"}, "body": {"es": "Desde que suena el clarín del tercio de muerte, el matador dispone de <b>diez minutos</b> para matar. El <b>primer aviso</b> suena a los diez; el <b>segundo</b>, tres minutos después; y el <b>tercero</b>, dos minutos más tarde: entonces el toro vuelve vivo a los corrales y la faena se considera fracaso. Los avisos presionan al diestro y explican muchos de los «silencios tras aviso» de las reseñas: una gran faena mal rematada con la espada se queda sin premio.", "de": "Ab dem Signal zum Todesdrittel hat der Matador <b>zehn Minuten</b> zum Töten. Der <b>erste Aviso</b> ertönt nach zehn Minuten, der <b>zweite</b> drei Minuten später, der <b>dritte</b> zwei Minuten danach: Dann kehrt der Stier lebend in die Ställe zurück und die Faena gilt als Misserfolg. Die Avisos setzen den Torero unter Druck und erklären viele der „Schweigen nach Aviso“ in den Reseñas: Eine große Faena, mit dem Degen verpatzt, bleibt ohne Preis.", "en": "From the trumpet opening the death third, the matador has <b>ten minutes</b> to kill. The <b>first aviso</b> sounds at ten minutes, the <b>second</b> three minutes later, and the <b>third</b> two minutes after that: the bull then returns alive to the corrals and the faena counts as a failure. The avisos pressure the matador and explain many of the “silence after an aviso” lines in the reviews: a great faena ruined by the sword goes unrewarded.", "ru": "С сигнала к терции смерти у матадора есть <b>десять минут</b>, чтобы убить. <b>Первое ависо</b> звучит на десятой минуте, <b>второе</b> — через три, <b>третье</b> — ещё через две: тогда бык живым возвращается в загоны, а фаэна считается провалом. Ависо давят на матадора и объясняют многие «молчание после ависо» в обзорах: великолепная фаэна, загубленная шпагой, остаётся без награды.", "ja": "仕留めの段のラッパから、闘牛士には<b>10分</b>が与えられます。<b>第1アビソ</b>は10分、<b>第2</b>はその3分後、<b>第3</b>はさらに2分後——このとき牛は生きたまま囲いに戻され、演技は失敗とみなされます。アビソは闘牛士に圧をかけ、批評でよく見る「勧告後の沈黙」の多くを説明します。見事なファエナも剣を損なえば無冠に終わるのです。"}}, {"g": 2, "icon": "🏆", "title": {"es": "Los trofeos", "de": "Die Trophäen", "en": "The trophies", "ru": "Трофеи", "ja": "賞"}, "body": {"es": "El público pide premio agitando <b>pañuelos blancos</b>; la presidencia decide y no está obligada a conceder, aunque la petición sea mayoritaria —de ahí las polémicas de esta feria—. Los premios, de menor a mayor: <b>vuelta al ruedo</b> (mérito sin oreja), <b>una oreja</b>, <b>dos orejas</b> y, muy excepcionalmente, el <b>rabo</b>. Cortar dos orejas abre la <b>Puerta Grande</b>: salida a hombros. Requisito ineludible: haber matado de una sola estocada y sin descabello, según el criterio de cada plaza.", "de": "Das Publikum fordert mit <b>weißen Tüchern</b> eine Auszeichnung; die Präsidentschaft entscheidet und ist nicht verpflichtet zu gewähren, selbst bei mehrheitlicher Forderung — daher die Kontroversen dieser Feria. Die Preise, aufsteigend: <b>Ehrenrunde</b> (Verdienst ohne Ohr), <b>ein Ohr</b>, <b>zwei Ohren</b> und, sehr ausnahmsweise, der <b>Schwanz</b>. Zwei Ohren öffnen die <b>Puerta Grande</b>: Auszug auf den Schultern. Unerlässlich: mit einem einzigen Degenstoß und ohne Descabello getötet zu haben, je nach Kriterium der Arena.", "en": "The crowd requests an award by waving <b>white handkerchiefs</b>; the president decides and is not obliged to grant it, even when the petition is overwhelming — hence this feria's controversies. The awards, in ascending order: a <b>lap of honour</b> (merit without an ear), <b>one ear</b>, <b>two ears</b> and, very exceptionally, the <b>tail</b>. Two ears open the <b>Puerta Grande</b>: carried out on shoulders. An unavoidable requirement: having killed with a single sword thrust and without the descabello, according to each ring's criteria.", "ru": "Публика просит награду, размахивая <b>белыми платками</b>; президиум решает и не обязан её присуждать, даже если петиция массовая — отсюда споры этой ферии. Награды по возрастанию: <b>круг почёта</b> (заслуга без уха), <b>одно ухо</b>, <b>два уха</b> и, крайне редко, <b>хвост</b>. Два уха открывают <b>Пуэрта-Гранде</b>: вынос на плечах. Непременное условие: убить одним ударом шпаги и без дескабельо, по критериям каждой арены.", "ja": "観客は<b>白いハンカチ</b>を振って賞を求めます。決めるのは議長で、要求が大多数でも認める義務はありません——今回のフェリアの論争もここから。賞は下から、<b>場内一周</b>（耳なしの功績）、<b>耳1枚</b>、<b>耳2枚</b>、そして極めて例外的に<b>尾</b>。耳2枚で<b>プエルタ・グランデ</b>が開き、肩車で退場します。外せない条件は、各闘牛場の基準に従い、一太刀で、デスカベリョなしに仕留めていることです。"}}, {"g": 2, "icon": "🕊️", "title": {"es": "El indulto", "de": "Die Begnadigung", "en": "The pardon (indulto)", "ru": "Помилование (индульто)", "ja": "恩赦（インドゥルト）"}, "body": {"es": "Un toro de <b>bravura excepcional</b> puede ser <b>indultado</b>. El público lo pide con pañuelos —naranjas en muchas plazas—, y hace falta el acuerdo del <b>ganadero</b> y del <b>matador</b>; la presidencia lo concede sacando el <b>pañuelo naranja</b>. El toro se retira vivo y pasa a semental, transmitiendo su casta. Es rarísimo y de enorme valor ganadero. Al toro bravo que muere también se le puede premiar con la <b>vuelta al ruedo</b> en el arrastre —como «Castigado», el tercer Jandilla del día 14—.", "de": "Ein Stier von <b>außergewöhnlicher Tapferkeit</b> kann <b>begnadigt</b> werden. Das Publikum fordert es mit Tüchern — vielerorts orange —, und es braucht die Zustimmung von <b>Züchter</b> und <b>Matador</b>; die Präsidentschaft gewährt sie mit dem <b>orangen Tuch</b>. Der Stier verlässt die Arena lebend und wird Deckbulle, gibt seine Casta weiter. Sehr selten und von großem züchterischen Wert. Auch ein tapferer Stier, der stirbt, kann beim Abtransport mit der <b>Ehrenrunde</b> geehrt werden — wie „Castigado“, der dritte Jandilla am 14. Juli.", "en": "A bull of <b>exceptional bravery</b> may be <b>pardoned</b>. The crowd asks for it with handkerchiefs — orange in many rings — and the <b>breeder's</b> and <b>matador's</b> agreement is needed; the president grants it by showing the <b>orange handkerchief</b>. The bull leaves alive and becomes a stud, passing on its caste. Very rare and of great breeding value. A brave bull that dies may also be honoured with a <b>lap of honour</b> as it is dragged out — like “Castigado”, the third Jandilla on 14 July.", "ru": "Быка <b>исключительной храбрости</b> могут <b>помиловать</b>. Публика просит об этом платками — во многих аренах оранжевыми, — и нужно согласие <b>заводчика</b> и <b>матадора</b>; президиум даёт его, показав <b>оранжевый платок</b>. Бык уходит живым и становится производителем, передавая свою касту. Крайне редко и очень ценно для породы. Погибшего храброго быка тоже могут почтить <b>кругом почёта</b> при выносе — как «Кастигадо», третьего Хандилью 14 июля.", "ja": "<b>並外れた勇敢さ</b>の牛は<b>恩赦</b>されることがあります。観客はハンカチ（多くの闘牛場でオレンジ）で求め、<b>牧場主</b>と<b>闘牛士</b>の同意が必要で、議長が<b>オレンジのハンカチ</b>を出して認めます。牛は生きて退場し、種牛としてその血を伝えます。極めて稀で、繁殖上の価値も大。死んだ勇敢な牛も、運び出しの際に<b>場内一周</b>で讃えられることがあります——7月14日の3頭目のハンディーリャ「カスティガード」のように。"}}, {"g": 2, "icon": "🟥", "title": {"es": "La presidencia y los pañuelos", "de": "Präsidentschaft & Tücher", "en": "The president & the handkerchiefs", "ru": "Президиум и платки", "ja": "議長席とハンカチ"}, "body": {"es": "En Navarra, el reglamento foral es explícito: la presidencia corresponde al <b>Alcalde</b> de la localidad, que puede delegarla en un <b>concejal</b> o en un <b>aficionado de reconocida competencia</b> —por eso los presidentes de esta feria son personas con nombre propio—. Mientras ejerce, tiene <b>consideración de autoridad</b>, y le asesoran un <b>veterinario</b> de los que reconocieron las reses y un <b>asesor artístico-taurino</b>. Dirige el festejo con <b>pañuelos</b>: <b>blanco</b> — cambio de tercio, salida del toro y concesión de orejas; <b>verde</b> — devolución de una res inválida o mansa; <b>rojo</b> — banderillas negras al toro que no acude al caballo; <b>azul</b> — vuelta al ruedo al toro; <b>naranja</b> — indulto.", "de": "In Navarra ist das Foralreglement eindeutig: Die Präsidentschaft obliegt dem <b>Bürgermeister</b> des Ortes, der sie an einen <b>Stadtrat</b> oder an einen <b>Aficionado von anerkannter Kompetenz</b> delegieren kann — daher haben die Präsidenten dieser Feria eigene Namen. Während der Ausübung gilt er als <b>Autorität</b>; beraten wird er von einem <b>Tierarzt</b> aus der Untersuchung und einem <b>künstlerisch-taurinen Berater</b>. Er leitet mit <b>Tüchern</b>: <b>weiß</b> — Drittelwechsel, Austritt des Stiers, Ohren; <b>grün</b> — Rückgabe eines untauglichen oder feigen Tiers; <b>rot</b> — schwarze Banderillas für den Stier, der nicht ans Pferd geht; <b>blau</b> — Ehrenrunde für den Stier; <b>orange</b> — Begnadigung.", "en": "In Navarra the foral regulation is explicit: the presidency belongs to the <b>Mayor</b> of the locality, who may delegate it to a <b>councillor</b> or to an <b>aficionado of recognised competence</b> — which is why this feria's presidents are named individuals. While serving, he or she has the <b>status of authority</b>, and is advised by one of the <b>vets</b> who inspected the animals and by an <b>artistic-taurine adviser</b>. The event is run with <b>handkerchiefs</b>: <b>white</b> — change of third, the bull's entrance, and awarding ears; <b>green</b> — returning an unfit or cowardly animal; <b>red</b> — black banderillas for a bull that won't go to the horse; <b>blue</b> — a lap of honour for the bull; <b>orange</b> — a pardon.", "ru": "В Наварре фуэросный регламент прямо говорит: председательство принадлежит <b>алькальду</b> города, который может делегировать его <b>советнику</b> или <b>любителю признанной компетентности</b> — поэтому у президентов этой ферии есть имена. На время исполнения он имеет <b>статус власти</b>, и его консультируют один из <b>ветеринаров</b>, осматривавших животных, и <b>художественно-таурино советник</b>. Праздник ведётся <b>платками</b>: <b>белый</b> — смена терции, выход быка, присуждение ушей; <b>зелёный</b> — возврат негодного или трусливого животного; <b>красный</b> — чёрные бандерильи быку, не идущему на лошадь; <b>синий</b> — круг почёта быку; <b>оранжевый</b> — помилование.", "ja": "ナバラのフエロ規則は明確です——議長職はその市町村の<b>市長</b>に属し、<b>市議</b>または<b>定評ある愛好家</b>に委任できます。だからこのフェリアの議長には個人名があるのです。職務中は<b>公権力</b>とみなされ、牛を検査した<b>獣医</b>の一人と<b>芸術・闘牛顧問</b>が補佐します。進行は<b>ハンカチ</b>で行います：<b>白</b>＝段の交代、牛の入場、耳の授与。<b>緑</b>＝不適格または臆病な牛の差し戻し。<b>赤</b>＝馬に向かわぬ牛への黒いバンデリリャ。<b>青</b>＝牛への場内一周。<b>オレンジ</b>＝恩赦。"}}, {"g": 2, "icon": "👥", "title": {"es": "Quién es quién", "de": "Wer ist wer", "en": "Who's who", "ru": "Кто есть кто", "ja": "登場人物"}, "body": {"es": "<b>Matador (o espada):</b> figura principal; lidia y mata dos toros. <b>Cuadrilla:</b> sus subalternos, todos inscritos en el Registro de Profesionales Taurinos — dos <b>picadores</b> y tres <b>banderilleros</b>, uno de ellos <b>peón de brega</b> o de confianza. <b>Mozo de espadas:</b> prepara y entrega los trastos; su <b>ayuda</b> le asiste. <b>Apoderado:</b> representa y contrata al torero. <b>Alguacilillos:</b> a caballo, enlazan al presidente con el ruedo. <b>Monosabios</b> y <b>areneros</b>: servicio de plaza. <b>Puntillero:</b> remata al toro. Los <b>rejoneadores</b> lidian a caballo, con sus propias reglas.", "de": "<b>Matador (Espada):</b> Hauptfigur; kämpft und tötet zwei Stiere. <b>Cuadrilla:</b> seine Untergebenen, alle im Register der Stierkampfprofis eingetragen — zwei <b>Picadores</b> und drei <b>Banderilleros</b>, einer davon <b>Peón de brega</b> bzw. Vertrauensmann. <b>Mozo de espadas:</b> bereitet die Geräte vor und reicht sie; seine <b>Ayuda</b> assistiert. <b>Apoderado:</b> vertritt den Torero und schließt Verträge. <b>Alguacilillos:</b> beritten, verbinden Präsident und Sand. <b>Monosabios</b> und <b>Areneros</b>: Arenadienst. <b>Puntillero:</b> gibt den Gnadenstoß. <b>Rejoneadores</b> kämpfen zu Pferd, mit eigenen Regeln.", "en": "<b>Matador (or espada):</b> the lead; fights and kills two bulls. <b>Cuadrilla:</b> his team, all entered in the Register of Bullfighting Professionals — two <b>picadors</b> and three <b>banderilleros</b>, one of them the <b>peón de brega</b> or trusted man. <b>Sword page (mozo de espadas):</b> prepares and hands over the gear; his <b>ayuda</b> assists. <b>Apoderado:</b> represents and books the torero. <b>Alguacilillos:</b> mounted, link the president to the ring. <b>Monosabios</b> and <b>areneros</b>: ring staff. <b>Puntillero:</b> delivers the coup de grâce. <b>Rejoneadores</b> fight on horseback, under their own rules.", "ru": "<b>Матадор (эспада):</b> главный; сражается и убивает двух быков. <b>Куадрилья:</b> его подчинённые, все внесены в Реестр профессионалов корриды — два <b>пикадора</b> и три <b>бандерильеро</b>, один из них <b>пеон де брега</b>, доверенный. <b>Мосо де эспадас:</b> готовит и подаёт снаряжение; ему помогает <b>аюда</b>. <b>Аподерадо:</b> представляет тореро и заключает контракты. <b>Альгвасильо:</b> верхом, связывают президента с ареной. <b>Моносабио</b> и <b>аренеро</b>: служба арены. <b>Пунтильеро:</b> добивает быка. <b>Рехонеадоры</b> сражаются верхом, по своим правилам.", "ja": "<b>マタドール（エスパダ）：</b>主役。2頭を戦い仕留めます。<b>クアドリーリャ：</b>その配下で全員が闘牛職業人登録簿に登録——<b>ピカドール</b>2名と<b>バンデリリェロ</b>3名（うち1名が<b>ペオン・デ・ブレガ</b>、腹心）。<b>モソ・デ・エスパダス：</b>道具を準備し手渡す。<b>アユダ</b>が補助。<b>アポデラード：</b>闘牛士の代理人・興行契約。<b>アルグアシリーリョ：</b>騎馬で議長と砂場をつなぐ。<b>モノサビオ</b>と<b>アレネロ</b>：場内係。<b>プンティリェロ：</b>とどめを刺す。<b>レホネアドール</b>は馬上で、独自の規則のもと戦います。"}}, {"g": 2, "icon": "🎫", "title": {"es": "Derechos del espectador", "de": "Rechte der Zuschauer", "en": "The spectator's rights", "ru": "Права зрителя", "ja": "観客の権利"}, "body": {"es": "El reglamento no sólo disciplina: también protege al público. El espectáculo debe celebrarse en los <b>términos anunciados</b>; si se sustituye la ganadería o un matador, ha de comunicarse, y hay supuestos de <b>devolución del importe</b> si el festejo se suspende antes de empezar o no se lidia el número anunciado de reses. El billete da derecho a una <b>localidad concreta</b>, y la empresa debe tener a disposición <b>hojas de reclamación</b>. La plaza debe contar con <b>enfermería</b> en condiciones y <b>ambulancia</b>; sin ellas no hay festejo.", "de": "Das Reglement diszipliniert nicht nur, es schützt auch das Publikum. Die Veranstaltung muss <b>wie angekündigt</b> stattfinden; wird die Zucht oder ein Matador ersetzt, ist dies mitzuteilen, und es gibt Fälle der <b>Rückerstattung</b>, wenn das Fest vor Beginn abgesagt wird oder nicht die angekündigte Zahl an Tieren bekämpft wird. Die Karte berechtigt zu einem <b>bestimmten Platz</b>, und der Veranstalter muss <b>Beschwerdeformulare</b> bereithalten. Die Arena braucht eine funktionsfähige <b>Krankenstation</b> und einen <b>Rettungswagen</b>; ohne sie kein Fest.", "en": "The regulation does not only discipline: it also protects the public. The event must take place <b>as advertised</b>; if the ranch or a matador is replaced it must be announced, and there are grounds for a <b>refund</b> if the event is cancelled before it starts or the advertised number of animals is not fought. The ticket entitles you to a <b>specific seat</b>, and the promoter must keep <b>complaint forms</b> available. The ring must have a properly equipped <b>infirmary</b> and an <b>ambulance</b>; without them there is no event.", "ru": "Регламент не только дисциплинирует — он и защищает публику. Зрелище должно состояться <b>на объявленных условиях</b>; замена хозяйства или матадора подлежит объявлению, и есть основания для <b>возврата денег</b>, если праздник отменён до начала или не выпущено объявленное число животных. Билет даёт право на <b>конкретное место</b>, а устроитель обязан держать <b>книгу жалоб</b>. Арена должна иметь оборудованный <b>лазарет</b> и <b>скорую</b>; без них праздника нет.", "ja": "規則は規律だけでなく、観客も守ります。興行は<b>告知どおり</b>に行われねばならず、牧場や闘牛士の変更は告知が必要です。開始前に中止された場合や、告知された頭数が出なかった場合には<b>払い戻し</b>の定めもあります。券は<b>特定の座席</b>の権利を与え、興行主は<b>苦情用紙</b>を備えねばなりません。闘牛場には整った<b>医務室</b>と<b>救急車</b>が必要で、それなしに興行はできません。"}}, {"g": 2, "icon": "🚫", "title": {"es": "Obligaciones y sanciones", "de": "Pflichten & Sanktionen", "en": "Duties & penalties", "ru": "Обязанности и санкции", "ja": "義務と制裁"}, "body": {"es": "El espectador debe ocupar su localidad, no arrojar objetos al ruedo ni obstaculizar el festejo, y no <b>saltar al ruedo</b>: los <b>espontáneos</b> son detenidos y sancionados, y el reglamento lo considera una infracción seria porque pone en peligro a los toreros y al público. La <b>Ley 10/1991</b> y, en Navarra, la <b>Ley Foral 2/1989</b> gradúan las infracciones en <b>leves, graves y muy graves</b>, con multas y, en los casos más serios, suspensión o inhabilitación de profesionales, ganaderos o empresas. El <b>afeitado</b> de las astas está entre lo más severamente perseguido.", "de": "Der Zuschauer muss seinen Platz einnehmen, nichts in den Sand werfen, das Fest nicht behindern und <b>nicht in die Arena springen</b>: <b>Espontáneos</b> werden festgenommen und bestraft; das Reglement wertet dies als schweren Verstoß, weil es Toreros und Publikum gefährdet. Das <b>Gesetz 10/1991</b> und in Navarra das <b>Foralgesetz 2/1989</b> stufen Verstöße in <b>leicht, schwer und sehr schwer</b> ein, mit Geldbußen und in gravierenden Fällen Suspendierung oder Berufsverbot für Profis, Züchter oder Unternehmen. Das <b>Afeitado</b> der Hörner gehört zum am schärfsten Verfolgten.", "en": "Spectators must occupy their seat, not throw objects into the ring or obstruct the event, and not <b>jump into the ring</b>: <b>espontáneos</b> are detained and fined, and the regulation treats it as a serious offence because it endangers the toreros and the public. <b>Law 10/1991</b> and, in Navarra, <b>Foral Law 2/1989</b> grade offences as <b>minor, serious and very serious</b>, with fines and, in the gravest cases, suspension or disqualification of professionals, breeders or promoters. <b>Shaving the horns</b> is among the most severely pursued.", "ru": "Зритель обязан занимать своё место, не бросать предметы на арену, не мешать празднику и не <b>прыгать на арену</b>: <b>эспонтанеос</b> задерживают и штрафуют, и регламент считает это серьёзным нарушением, ибо оно подвергает опасности тореро и публику. <b>Закон 10/1991</b> и, в Наварре, <b>Фуэросный закон 2/1989</b> делят нарушения на <b>лёгкие, тяжкие и особо тяжкие</b>, со штрафами и, в самых серьёзных случаях, отстранением или дисквалификацией профессионалов, заводчиков или устроителей. <b>Подпиливание рогов</b> — среди самых сурово преследуемых деяний.", "ja": "観客は自席に着き、砂場に物を投げず、興行を妨げず、<b>砂場に飛び降りない</b>こと。<b>エスポンターネオ</b>は身柄を確保され処罰されます。規則はこれを重大な違反とみなします——闘牛士と観客を危険にさらすからです。<b>1991年法10号</b>、ナバラでは<b>フエロ法2/1989</b>が違反を<b>軽微・重大・極めて重大</b>に区分し、罰金や、最も重い場合には職業人・牧場主・興行主の資格停止や失格を科します。角の<b>削り（アフェイタード）</b>は最も厳しく追及される行為のひとつです。"}}, {"g": 2, "icon": "📣", "title": {"es": "En la plaza", "de": "In der Arena", "en": "In the ring", "ru": "На арене", "ja": "闘牛場にて"}, "body": {"es": "Más allá de la norma escrita hay un código no escrito: el aficionado premia con <b>olés</b> lo bien hecho y muestra su desacuerdo con el silencio —mucho más elocuente que el abucheo—. Se respeta al toro bravo, se aplaude en el arrastre al que lo mereció y se juzga con exigencia la espada. En Pamplona, además, la fiesta tiene su propia liturgia: las peñas, sus charangas y su ironía. La <b>Sobrepuerta</b> del <b>Tendido 1</b>, justo encima del callejón por donde entra el encierro, es desde 1979 el sitio de la <b>Peña Borussia</b>.", "de": "Jenseits der geschriebenen Norm gibt es einen ungeschriebenen Kodex: Der Aficionado belohnt Gelungenes mit <b>Olés</b> und zeigt Missfallen durch Schweigen — viel beredter als Pfiffe. Man respektiert den tapferen Stier, applaudiert beim Abtransport dem, der es verdient hat, und beurteilt den Degen streng. In Pamplona hat das Fest zudem seine eigene Liturgie: die Peñas, ihre Charangas, ihre Ironie. Die <b>Sobrepuerta</b> des <b>Tendido 1</b>, direkt über dem Gang, durch den der Encierro einläuft, ist seit 1979 der Platz der <b>Peña Borussia</b>.", "en": "Beyond the written rule there is an unwritten code: the aficionado rewards what is well done with <b>olés</b> and shows disapproval through silence — far more eloquent than booing. The brave bull is respected, the one that earned it is applauded as it is dragged out, and the sword is judged strictly. In Pamplona the fiesta has its own liturgy too: the peñas, their charangas, their irony. The <b>Sobrepuerta</b> of <b>Tendido 1</b>, right above the passage where the encierro enters, has been the <b>Peña Borussia</b>'s spot since 1979.", "ru": "Помимо писаной нормы есть неписаный кодекс: знаток награждает удачное возгласами <b>olé</b> и выражает несогласие молчанием — куда красноречивее свиста. Храброго быка уважают, заслужившему аплодируют при выносе, а шпагу судят строго. В Памплоне у праздника есть и своя литургия: пеньи, их чаранги, их ирония. <b>Sobrepuerta</b> <b>Тендидо 1</b>, прямо над проходом, куда вбегает энсьерро, с 1979 года — место <b>Пеньи Боруссия</b>.", "ja": "成文の規則の先に、不文の掟があります。愛好家は見事な技を<b>オーレ</b>で讃え、不満は沈黙で示します——野次よりはるかに雄弁です。勇敢な牛は敬われ、値する牛は運び出しの際に拍手され、剣は厳しく判定されます。パンプローナには独自の典礼もあります——ペーニャ、そのチャランガ、その皮肉。牛追いが駆け込む通路の真上にある<b>テンディード1</b>の<b>ソブレプエルタ</b>は、1979年以来<b>ペーニャ・ボルシア</b>の席です。"}}], SRC=[{"t": "Ley 10/1991, de 4 de abril · potestades administrativas en materia de espectáculos taurinos", "u": "https://www.boe.es/buscar/act.php?id=BOE-A-1991-8402"}, {"t": "Real Decreto 145/1996, de 2 de febrero · Reglamento de Espectáculos Taurinos (BOE)", "u": "https://www.boe.es/buscar/act.php?id=BOE-A-1996-4945"}, {"t": "Ley 18/2013, de 12 de noviembre · la Tauromaquia como patrimonio cultural (BOE)", "u": "https://www.boe.es/buscar/act.php?id=BOE-A-2013-11837"}, {"t": "Decreto Foral 249/1992, de 29 de junio · Reglamento de Espectáculos Taurinos de Navarra", "u": "https://www.lexnavarra.navarra.es/detalle.asp?r=28674"}, {"t": "Ayuntamiento de Pamplona · Ordenanza reguladora del encierro (PDF)", "u": "https://www.pamplona.es/system/files/files-migrated/VARIOS/ordenanza_encierro.pdf"}, {"t": "Ministerio de Cultura · normativa taurina estatal", "u": "https://www.cultura.gob.es/cultura/tauromaquia/normativa/normativa-estatal.html"}];
function detectLang(){try{var s=localStorage.getItem('pb_lang');if(s&&UI.title[s])return s;}catch(e){}var n=(navigator.language||'es').slice(0,2).toLowerCase();return UI.title[n]?n:'es';}
var LANG=detectLang();
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setLang(l){LANG=l;try{localStorage.setItem('pb_lang',l);}catch(e){}render();}
function render(){
  document.documentElement.lang=LANG;
  document.getElementById('h-title').textContent=UI.title[LANG];
  document.getElementById('h-sub').textContent=UI.sub[LANG];
  document.getElementById('hero-t').textContent=UI.title[LANG];
  document.getElementById('hero-s').textContent=UI.sub[LANG];
  document.getElementById('back-t').textContent=UI.back[LANG];
  document.getElementById('srct').textContent=UI.srct[LANG];
  document.getElementById('disc').textContent=UI.disclaimer[LANG];
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.dataset.lang===LANG);});
  var h='',lastG=0;
  SEC.forEach(function(s){
    if(s.g!==lastG){h+='<div class="grp">'+UI['g'+s.g][LANG]+'</div>';lastG=s.g;}
    h+='<div class="card"><h2><span class="ic">'+s.icon+'</span>'+s.title[LANG]+'</h2><div class="bd">'+s.body[LANG]+'</div></div>';
  });
  document.getElementById('sections').innerHTML=h;
  document.getElementById('srcs').innerHTML=SRC.map(function(x){
    return '<li><a href="'+x.u+'" target="_blank" rel="noopener">'+esc(x.t)+'</a></li>';
  }).join('');
}
document.getElementById('langbar').addEventListener('click',function(e){var b=e.target.closest('.lang-btn');if(b)setLang(b.dataset.lang);});
render();
</script>
