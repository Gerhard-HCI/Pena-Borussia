<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reglamento taurino · Peña Borussia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;700;800&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--rojo:#A4151F;--rojo-2:#C0202E;--rojo-dk:#7E0F18;--oro:#E0A92E;--verde:#1C7A44;--verde-dk:#125330;
--paper:#FBF7EF;--paper-2:#F3EAD8;--card:#fff;--ink:#231a17;--ink-2:#4b3f39;--ink-3:#6f625b;--ink-4:#9a8d84;
--border:#e7dcc8;--border-2:#efe7d7;--r:18px;--r-md:12px;--sans:'Archivo',system-ui,sans-serif;--serif:'Spectral',Georgia,serif;--poster:'Anton',Impact,sans-serif;
--shadow:0 6px 20px rgba(60,30,10,.08)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5}
a{color:inherit}
#hdr{position:sticky;top:0;z-index:10;background:linear-gradient(120deg,var(--rojo) 0%,var(--rojo-2) 60%,var(--rojo-dk) 100%);color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.hdr-top{display:flex;align-items:center;gap:10px;padding:11px 14px}
.hdr-mono{width:36px;height:36px;border-radius:9px;background:#fff;padding:3px;object-fit:contain;flex-shrink:0}
.hdr-tt{flex:1;min-width:0}
.hdr-tt .t{font-weight:800;font-size:15px;letter-spacing:.3px;line-height:1.05}
.hdr-tt .s{font-size:10.5px;color:rgba(255,255,255,.82);margin-top:1px}
.panuelo{height:7px;background:repeating-linear-gradient(90deg,#fff 0 14px,#C0202E 14px 28px)}
.lang-bar{display:flex;gap:2px;padding:6px 8px;background:var(--rojo-dk);border-top:1px solid rgba(255,255,255,.12);justify-content:flex-end}
.lang-btn{font-size:19px;line-height:1;padding:6px 5px;background:none;border:none;border-bottom:3px solid transparent;opacity:.85;cursor:pointer}
.lang-btn.active{opacity:1;border-bottom-color:var(--oro);background:rgba(224,169,46,.16)}
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 40px}
.back{display:inline-flex;align-items:center;gap:7px;margin:2px 0 14px;font-weight:700;font-size:13px;color:var(--rojo-2);text-decoration:none;background:var(--card);border:1px solid var(--border-2);padding:8px 14px;border-radius:22px}
.hero{background:linear-gradient(150deg,var(--rojo) 0%,var(--rojo-dk) 100%);color:#fff;border-radius:var(--r);padding:20px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.hero h1{font-family:var(--poster);font-size:clamp(30px,9vw,46px);line-height:.98;letter-spacing:.5px;text-transform:uppercase;margin:0}
.hero .sub{font-family:var(--serif);font-style:italic;font-size:15px;color:rgba(255,255,255,.9);margin-top:8px}
.card{background:var(--card);border:1px solid var(--border-2);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 16px;margin-bottom:12px}
.card h2{display:flex;align-items:center;gap:10px;font-family:var(--poster);font-size:19px;letter-spacing:.4px;text-transform:uppercase;color:var(--ink);margin:0 0 8px}
.card h2 .ic{font-size:20px}
.card .bd{font-size:14px;line-height:1.62;color:var(--ink-2)}
.card .bd b{color:var(--ink);font-weight:700}
.note{font-size:12px;color:var(--ink-4);line-height:1.5;background:var(--paper-2);border:1px solid var(--border-2);border-radius:var(--r-md);padding:11px 13px;margin-top:6px}
.foot{text-align:center;color:var(--ink-4);font-size:11px;margin-top:20px}
</style>
</head>

<script>
var UI={"title": {"es": "Reglamento taurino", "de": "Taurines Reglement", "en": "Bullfighting regulations", "ru": "Регламент корриды", "ja": "闘牛規則"}, "sub": {"es": "Guía de la lidia, las suertes y los trofeos", "de": "Leitfaden zu Lidia, Suertes und Trophäen", "en": "A guide to the lidia, the suertes and the trophies", "ru": "Путеводитель по лидии, суэрте и трофеям", "ja": "リディア・スエルテ・賞の手引き"}, "back": {"es": "Volver a la app", "de": "Zurück zur App", "en": "Back to the app", "ru": "Назад в приложение", "ja": "アプリに戻る"}, "disclaimer": {"es": "Resumen divulgativo para la Peña, redactado en lenguaje sencillo. No sustituye al Reglamento oficial de espectáculos taurinos.", "de": "Erläuternde Zusammenfassung für die Peña in einfacher Sprache. Ersetzt nicht das offizielle Reglement für Stierkampf-Veranstaltungen.", "en": "A plain-language summary for the Peña. It does not replace the official regulations for bullfighting events.", "ru": "Популярное резюме для Пеньи, простым языком. Не заменяет официальный регламент корридных зрелищ.", "ja": "ペーニャ向けのやさしい解説要約です。公式の闘牛興行規則に代わるものではありません。"}}, SEC=[{"icon": "🐂", "title": {"es": "El toro", "de": "Der Stier", "en": "The bull", "ru": "Бык", "ja": "牛"}, "body": {"es": "El toro de lidia debe tener entre <b>4 y 6 años</b> y un peso mínimo (en Pamplona, toros de gran trapío, por encima de los 500 kg). Cada tarde se lidian <b>seis toros</b> de una misma ganadería, más dos <b>sobreros</b> de reserva por si alguno se inutiliza o es devuelto. Por la mañana, en el <b>apartado</b> (13:00 h), se sortean y emparejan los toros y se encierran de uno en uno en los chiqueros.", "de": "Der Kampfstier muss zwischen <b>4 und 6 Jahre</b> alt sein und ein Mindestgewicht haben (in Pamplona Stiere von großem Trapío, über 500 kg). Pro Nachmittag werden <b>sechs Stiere</b> einer Zucht bekämpft, dazu zwei <b>Sobreros</b> als Reserve, falls einer ausfällt oder zurückgewiesen wird. Vormittags werden beim <b>Apartado</b> (13:00 Uhr) die Stiere ausgelost, gepaart und einzeln in die Boxen gesperrt.", "en": "The fighting bull must be <b>4 to 6 years</b> old and meet a minimum weight (in Pamplona, bulls of great presence, above 500 kg). Each afternoon <b>six bulls</b> from one ranch are fought, plus two reserve <b>sobreros</b> in case one is disabled or returned. In the morning <b>apartado</b> (13:00), the bulls are drawn, paired and penned one by one.", "ru": "Боевой бык должен быть в возрасте <b>4–6 лет</b> и иметь минимальный вес (в Памплоне — быки внушительного вида, свыше 500 кг). Каждый вечер сражаются <b>шесть быков</b> одного хозяйства плюс два запасных <b>собреро</b> на случай, если один выбывает или его возвращают. Утром на <b>апартадо</b> (13:00) быков разыгрывают, разбивают на пары и по одному запирают в загоны.", "ja": "闘牛は<b>4〜6歳</b>で最低体重を満たす必要があります（パンプローナでは風格ある500kg超の牛）。毎午後、同一牧場の<b>6頭</b>が戦い、加えて予備の<b>ソブレロ</b>が2頭（1頭が戦えなくなる／差し戻された場合に備えて）。午前の<b>アパルタード</b>（13:00）で牛を抽選・組み合わせし、1頭ずつ囲いに入れます。"}}, {"icon": "🎺", "title": {"es": "El paseíllo", "de": "Der Paseíllo", "en": "The paseíllo", "ru": "Пасейльо", "ja": "パセイーリョ"}, "body": {"es": "A las <b>18:30 h</b>, al toque de clarines, se abre el festejo con el <b>paseíllo</b>: desfilan los <b>alguacilillos</b> a caballo, los tres <b>matadores</b> (por antigüedad: el más antiguo a la izquierda), sus <b>cuadrillas</b> (banderilleros y picadores) y los servicios de plaza (monosabios y mulillas). Preside la corrida la autoridad desde el <b>palco presidencial</b>.", "de": "Um <b>18:30 Uhr</b> eröffnet der <b>Paseíllo</b> mit Trompetenklang das Fest: Es defilieren die berittenen <b>Alguacilillos</b>, die drei <b>Matadore</b> (nach Anciennität: der Älteste links), ihre <b>Cuadrillas</b> (Banderilleros und Picadores) und die Arenadienste (Monosabios und Maultiergespanne). Die Corrida leitet die Autorität vom <b>Präsidentenloge</b> aus.", "en": "At <b>18:30</b>, to a trumpet call, the <b>paseíllo</b> opens the event: the mounted <b>alguacilillos</b> parade, the three <b>matadors</b> (by seniority — the most senior on the left), their <b>cuadrillas</b> (banderilleros and picadors) and the ring services (monosabios and mule teams). The authority presides from the <b>president's box</b>.", "ru": "В <b>18:30</b> под звуки труб праздник открывает <b>пасейльо</b>: проходят конные <b>альгвасильо</b>, три <b>матадора</b> (по старшинству — старший слева), их <b>куадрильи</b> (бандерильеро и пикадоры) и служба арены (моносабио и упряжки мулов). Корридой руководит власть из <b>президентской ложи</b>.", "ja": "<b>18:30</b>、ラッパの合図で<b>パセイーリョ</b>が幕を開けます。騎馬の<b>アルグアシリーリョ</b>、3人の<b>マタドール</b>（先任順、最年長が左）、その<b>クアドリーリャ</b>（バンデリリェロとピカドール）、場内係（モノサビオと騾馬隊）が行進。<b>議長席</b>から当局が進行を統括します。"}}, {"icon": "🐴", "title": {"es": "Primer tercio · varas", "de": "Erstes Drittel · Varas", "en": "First third · the picadors", "ru": "Первая терция · вары", "ja": "第一の段 · バラ"}, "body": {"es": "Tras recibir al toro con el <b>capote</b> (verónicas), suena el clarín y entran los <b>picadores</b> a caballo. En la <b>suerte de varas</b>, el picador clava la <b>puya</b> en el morrillo para medir la bravura y la fuerza del toro y corregir su embestida. Entre puyazo y puyazo, los matadores lucen en los <b>quites</b>. El público suele pedir que se respete al toro si es bravo.", "de": "Nachdem der Stier mit dem <b>Capote</b> empfangen wurde (Verónicas), ertönt das Signal und die berittenen <b>Picadores</b> reiten ein. Bei der <b>Suerte de varas</b> setzt der Picador die <b>Puya</b> in den Morrillo, um Tapferkeit und Kraft zu prüfen und den Angriff zu korrigieren. Zwischen den Stichen glänzen die Matadore in den <b>Quites</b>. Das Publikum fordert oft, einen tapferen Stier zu schonen.", "en": "After the bull is received with the <b>cape</b> (verónicas), the trumpet sounds and the mounted <b>picadors</b> enter. In the <b>suerte de varas</b>, the picador places the <b>lance</b> in the morrillo to test the bull's bravery and strength and temper its charge. Between lances, the matadors shine in the <b>quites</b>. The crowd often asks that a brave bull be spared further punishment.", "ru": "Быка встречают <b>плащом</b> (вероники), звучит труба, и въезжают конные <b>пикадоры</b>. В <b>суэрте-де-варас</b> пикадор вонзает <b>пику</b> в загривок, чтобы проверить храбрость и силу быка и умерить его натиск. Между уколами матадоры блистают в <b>китес</b>. Публика часто просит поберечь храброго быка.", "ja": "<b>カポーテ</b>（ベロニカ）で牛を迎えた後、ラッパが鳴り、騎馬の<b>ピカドール</b>が入場。<b>スエルテ・デ・バラス</b>では、ピカドールが<b>槍（プヤ）</b>を肩に刺し、牛の勇敢さと力を測り、突進を和らげます。突きの合間にマタドールが<b>キテ</b>で技を見せます。勇敢な牛は労わるよう観客が求めることも。"}}, {"icon": "🎯", "title": {"es": "Segundo tercio · banderillas", "de": "Zweites Drittel · Banderillas", "en": "Second third · banderillas", "ru": "Вторая терция · бандерильи", "ja": "第二の段 · バンデリリャ"}, "body": {"es": "Al segundo toque, los <b>banderilleros</b> (o el propio matador) clavan tres pares de <b>banderillas</b> en el morrillo, citando al toro y quebrando o cuadrando en la cara. Este tercio aviva al toro y prepara la faena de muleta. Es de los momentos más vistosos y arriesgados, sin engaño de por medio.", "de": "Beim zweiten Signal setzen die <b>Banderilleros</b> (oder der Matador selbst) drei Paar <b>Banderillas</b> in den Morrillo, indem sie den Stier rufen und vor der Stirn ausweichen oder frontal ansetzen. Dieses Drittel belebt den Stier und bereitet die Muleta-Faena vor — einer der spektakulärsten und riskantesten Momente, ganz ohne Tuch als Schutz.", "en": "At the second trumpet, the <b>banderilleros</b> (or the matador himself) place three pairs of <b>banderillas</b> in the morrillo, calling the bull and breaking away or planting them head-on. This third revives the bull and prepares the muleta work — one of the most spectacular and dangerous moments, with no cloth to protect them.", "ru": "По второму сигналу <b>бандерильеро</b> (или сам матадор) вонзают три пары <b>бандерилий</b> в загривок, вызывая быка и уходя в сторону или ставя их «в лоб». Эта терция взбадривает быка и готовит работу с мулетой — один из самых зрелищных и опасных моментов, без плаща для защиты.", "ja": "2度目の合図で、<b>バンデリリェロ</b>（または闘牛士自身）が<b>バンデリリャ</b>を3対、肩に刺します。牛を誘い、身をかわすか正面から。この段は牛を奮い立たせ、ムレタの演技を準備します。布の守りなしで行う、最も華麗で危険な場面のひとつです。"}}, {"icon": "⚔️", "title": {"es": "Tercer tercio · muerte", "de": "Drittes Drittel · Tod", "en": "Third third · death", "ru": "Третья терция · смерть", "ja": "第三の段 · 仕留め"}, "body": {"es": "Es el tercio de la <b>faena de muleta</b> y la <b>estocada</b>. El matador brinda el toro, torea con la muleta (naturales, derechazos, series ligadas) buscando <b>templar</b> y mandar, y remata entrando a matar con el estoque. Si falla, puede usar el <b>descabello</b>. La calidad de la faena y una espada certera son la base de los trofeos.", "de": "Das Drittel der <b>Muleta-Faena</b> und des <b>Degenstoßes</b>. Der Matador widmet den Stier, arbeitet mit der Muleta (Naturales, Derechazos, verbundene Serien), sucht <b>Temple</b> und Herrschaft und tötet mit dem Degen. Misslingt es, kann er den <b>Descabello</b> einsetzen. Qualität der Faena und ein sicherer Degen sind die Grundlage der Trophäen.", "en": "The third of the <b>muleta faena</b> and the <b>sword</b>. The matador dedicates the bull, works with the muleta (naturales, derechazos, linked series) seeking <b>temple</b> and command, and kills by going in with the estoque. If he fails, he may use the <b>descabello</b>. The quality of the faena and a clean sword are the basis of the trophies.", "ru": "Терция <b>работы с мулетой</b> и <b>эстокады</b>. Матадор посвящает быка, работает мулетой (натуралес, дереча́со, связанные серии), ища <b>темп</b> и господство, и закалывает быка эстоком. При неудаче применяет <b>дескабельо</b>. Качество фаэны и точная шпага — основа трофеев.", "ja": "<b>ムレタの演技</b>と<b>剣（エストカーダ）</b>の段。闘牛士は牛を捧げ、ムレタで技（ナトゥラル、デレチャソ、連続技）を見せ、<b>テンプレ</b>と支配を追求し、エストケで仕留めます。失敗すれば<b>デスカベリョ</b>を用います。演技の質と確かな剣が賞の基礎です。"}}, {"icon": "⏱️", "title": {"es": "Los avisos", "de": "Die Avisos", "en": "The avisos (warnings)", "ru": "Ависо (предупреждения)", "ja": "アビソ（勧告）"}, "body": {"es": "Desde que suena el clarín del tercio de muerte, el matador dispone de <b>10 minutos</b> para matar. El <b>primer aviso</b> suena a los 10; el <b>segundo</b>, dos minutos después; con el <b>tercero</b> el toro es devuelto a los corrales y se considera fracaso. Los avisos presionan al diestro y penalizan las faenas largas o las esperas con la espada.", "de": "Ab dem Signal zum Todesdrittel hat der Matador <b>10 Minuten</b> zum Töten. Der <b>erste Aviso</b> ertönt nach 10 Minuten, der <b>zweite</b> zwei Minuten später; beim <b>dritten</b> wird der Stier in die Ställe zurückgebracht — ein Misserfolg. Die Avisos setzen den Torero unter Druck und bestrafen lange Faenas oder Zögern mit dem Degen.", "en": "From the trumpet opening the death third, the matador has <b>10 minutes</b> to kill. The <b>first aviso</b> sounds at 10 minutes, the <b>second</b> two minutes later; with the <b>third</b> the bull is returned to the corrals — a failure. The avisos pressure the matador and penalise over-long faenas or hesitation with the sword.", "ru": "С сигнала к терции смерти у матадора есть <b>10 минут</b>, чтобы убить. <b>Первое ависо</b> звучит на 10-й минуте, <b>второе</b> — через две; при <b>третьем</b> быка возвращают в загоны — это провал. Ависо давят на матадора и наказывают затянутые фаэны или промедление со шпагой.", "ja": "仕留めの段のラッパから、闘牛士には<b>10分</b>が与えられます。<b>第1アビソ</b>は10分、<b>第2</b>はその2分後、<b>第3</b>で牛は囲いに戻され失敗となります。アビソは闘牛士に圧をかけ、長すぎる演技や剣のためらいを罰します。"}}, {"icon": "🏆", "title": {"es": "Los trofeos", "de": "Die Trophäen", "en": "The trophies", "ru": "Трофеи", "ja": "賞"}, "body": {"es": "Según la faena, el público pide premio agitando <b>pañuelos blancos</b> y la presidencia decide: <b>vuelta al ruedo</b> (mérito sin oreja), <b>una oreja</b>, <b>dos orejas</b> y, excepcionalmente, el <b>rabo</b>. Cortar <b>dos orejas</b> (o una en plazas de primera con normas estrictas) da derecho a salir por la <b>Puerta Grande</b> a hombros. También el toro bravo puede dar la vuelta al ruedo tras su arrastre.", "de": "Je nach Faena fordert das Publikum mit <b>weißen Tüchern</b> eine Auszeichnung, und die Präsidentschaft entscheidet: <b>Ehrenrunde</b> (Verdienst ohne Ohr), <b>ein Ohr</b>, <b>zwei Ohren</b> und, ausnahmsweise, der <b>Schwanz</b>. <b>Zwei Ohren</b> (in Arenen erster Kategorie mit strengen Regeln eines) berechtigen zum Auszug durch die <b>Puerta Grande</b> auf den Schultern. Auch ein tapferer Stier kann nach dem Abtransport die Ehrenrunde erhalten.", "en": "Depending on the faena, the crowd requests an award by waving <b>white handkerchiefs</b> and the president decides: a <b>vuelta al ruedo</b> (merit without an ear), <b>one ear</b>, <b>two ears</b> and, exceptionally, the <b>tail</b>. Cutting <b>two ears</b> (or one in first-category rings with strict rules) earns the right to leave through the <b>Puerta Grande</b> on shoulders. A brave bull may also be given a lap of honour after being dragged out.", "ru": "В зависимости от фаэны публика просит награду, размахивая <b>белыми платками</b>, а президиум решает: <b>круг почёта</b> (заслуга без уха), <b>одно ухо</b>, <b>два уха</b> и, в исключительных случаях, <b>хвост</b>. Два уха (или одно на аренах первой категории со строгими правилами) дают право выйти через <b>Пуэрта-Гранде</b> на плечах. Храброму быку тоже могут дать круг почёта после уноса.", "ja": "演技に応じ、観客は<b>白いハンカチ</b>を振って賞を求め、議長が判断します：<b>場内一周</b>（耳なしの功績）、<b>耳1枚</b>、<b>耳2枚</b>、例外的に<b>尾</b>。<b>耳2枚</b>（厳格な一級闘牛場では1枚）で<b>プエルタ・グランデ</b>から肩車で退場する権利を得ます。勇敢な牛も、運び出しの後に場内一周を贈られることがあります。"}}, {"icon": "🕊️", "title": {"es": "El indulto", "de": "Die Begnadigung", "en": "The pardon (indulto)", "ru": "Помилование (индульто)", "ja": "恩赦（インドゥルト）"}, "body": {"es": "Excepcionalmente, un toro de <b>bravura extraordinaria</b> puede ser <b>indultado</b>: el público lo pide con <b>pañuelos naranjas</b> (o blancos, según plaza) y, con acuerdo del ganadero y el matador, la presidencia saca el <b>pañuelo naranja</b>. El toro se retira vivo para vivir como semental. Es rarísimo y de enorme valor ganadero.", "de": "Ausnahmsweise kann ein Stier von <b>außergewöhnlicher Tapferkeit</b> <b>begnadigt</b> werden: Das Publikum fordert es mit <b>orangen Tüchern</b> (oder weißen, je nach Arena), und mit Zustimmung von Züchter und Matador zeigt die Präsidentschaft das <b>orange Tuch</b>. Der Stier verlässt die Arena lebend und wird Zuchtstier. Sehr selten und von großem züchterischen Wert.", "en": "Exceptionally, a bull of <b>extraordinary bravery</b> may be <b>pardoned</b>: the crowd requests it with <b>orange handkerchiefs</b> (or white, depending on the ring) and, with the breeder's and matador's agreement, the president shows the <b>orange handkerchief</b>. The bull leaves alive to live as a stud. Very rare and of great breeding value.", "ru": "В исключительных случаях быка <b>чрезвычайной храбрости</b> могут <b>помиловать</b>: публика просит об этом <b>оранжевыми платками</b> (или белыми, смотря по арене), и с согласия заводчика и матадора президиум показывает <b>оранжевый платок</b>. Бык покидает арену живым и становится производителем. Крайне редко и очень ценно для породы.", "ja": "例外的に、<b>並外れた勇敢さ</b>の牛は<b>恩赦</b>されることがあります。観客は<b>オレンジのハンカチ</b>（闘牛場により白）で求め、牧場主と闘牛士の同意のもと、議長が<b>オレンジのハンカチ</b>を出します。牛は生きて退場し、種牛となります。極めて稀で、繁殖上の価値も大です。"}}, {"icon": "🟥", "title": {"es": "La presidencia y los pañuelos", "de": "Präsidentschaft & Tücher", "en": "The president & the handkerchiefs", "ru": "Президиум и платки", "ja": "議長席とハンカチ"}, "body": {"es": "La <b>presidencia</b> dirige el festejo con <b>pañuelos</b> de colores: <b>blanco</b> — cambio de tercio, salida del toro, y concesión de orejas a petición del público; <b>verde</b> — devolución de un toro inválido o manso a los corrales; <b>rojo</b> — banderillas negras (de castigo) a un toro que no embiste al caballo; <b>azul</b> — vuelta al ruedo al toro; <b>naranja</b> — indulto. Le asesoran un <b>asesor taurino</b> y un <b>veterinario</b>.", "de": "Die <b>Präsidentschaft</b> leitet das Fest mit farbigen <b>Tüchern</b>: <b>weiß</b> — Wechsel des Drittels, Ausgang des Stiers und Zuerkennung von Ohren auf Publikumswunsch; <b>grün</b> — Rückgabe eines untauglichen oder feigen Stiers; <b>rot</b> — schwarze (Straf-)Banderillas für einen Stier, der das Pferd nicht angreift; <b>blau</b> — Ehrenrunde für den Stier; <b>orange</b> — Begnadigung. Beraten von <b>Asesor</b> und <b>Tierarzt</b>.", "en": "The <b>president</b> runs the event with coloured <b>handkerchiefs</b>: <b>white</b> — change of third, the bull's entrance, and awarding ears at the public's request; <b>green</b> — returning an unfit or cowardly bull to the corrals; <b>red</b> — black (punishment) banderillas for a bull that won't charge the horse; <b>blue</b> — a lap of honour for the bull; <b>orange</b> — a pardon. Advised by a <b>taurine adviser</b> and a <b>vet</b>.", "ru": "<b>Президиум</b> ведёт праздник цветными <b>платками</b>: <b>белый</b> — смена терции, выход быка и присуждение ушей по просьбе публики; <b>зелёный</b> — возврат негодного или трусливого быка в загоны; <b>красный</b> — чёрные (штрафные) бандерильи быку, не идущему на лошадь; <b>синий</b> — круг почёта быку; <b>оранжевый</b> — помилование. Ему помогают <b>таурино-советник</b> и <b>ветеринар</b>.", "ja": "<b>議長</b>は色つき<b>ハンカチ</b>で進行します：<b>白</b>＝段の交代、牛の入場、観客の求めに応じた耳の授与。<b>緑</b>＝不適格または臆病な牛の差し戻し。<b>赤</b>＝馬に向かわぬ牛への黒い（罰）バンデリリャ。<b>青</b>＝牛への場内一周。<b>オレンジ</b>＝恩赦。<b>闘牛顧問</b>と<b>獣医</b>が補佐します。"}}, {"icon": "👥", "title": {"es": "Quién es quién", "de": "Wer ist wer", "en": "Who's who", "ru": "Кто есть кто", "ja": "登場人物"}, "body": {"es": "<b>Matador (o espada):</b> figura principal, lidia y mata dos toros. <b>Cuadrilla:</b> sus subalternos — dos <b>picadores</b> (a caballo) y tres <b>banderilleros</b> (uno hace de <b>peón de brega</b>). <b>Mozo de espadas:</b> prepara y entrega los trastos. <b>Alguacilillos:</b> a caballo, enlazan al presidente con el ruedo. <b>Puntillero:</b> remata al toro. En <b>rejones</b>, el <b>rejoneador</b> lidia a caballo.", "de": "<b>Matador (Espada):</b> Hauptfigur, kämpft und tötet zwei Stiere. <b>Cuadrilla:</b> seine Untergebenen — zwei <b>Picadores</b> (beritten) und drei <b>Banderilleros</b> (einer als <b>Peón de brega</b>). <b>Mozo de espadas:</b> bereitet die Geräte vor. <b>Alguacilillos:</b> beritten, verbinden Präsident und Sand. <b>Puntillero:</b> gibt den Gnadenstoß. Beim <b>Rejoneo</b> kämpft der <b>Rejoneador</b> zu Pferd.", "en": "<b>Matador (or espada):</b> the lead, fights and kills two bulls. <b>Cuadrilla:</b> his team — two <b>picadors</b> (mounted) and three <b>banderilleros</b> (one acting as <b>peón de brega</b>). <b>Sword page (mozo de espadas):</b> prepares and hands over the gear. <b>Alguacilillos:</b> mounted, link the president to the ring. <b>Puntillero:</b> delivers the coup de grâce. In <b>rejones</b>, the <b>rejoneador</b> fights on horseback.", "ru": "<b>Матадор (эспада):</b> главный, сражается и убивает двух быков. <b>Куадрилья:</b> его помощники — два <b>пикадора</b> (верхом) и три <b>бандерильеро</b> (один — <b>пеон де брега</b>). <b>Мосо де эспадас:</b> готовит и подаёт снаряжение. <b>Альгвасильо:</b> верхом, связывают президента с ареной. <b>Пунтильеро:</b> добивает быка. В <b>рехонео</b> <b>рехонеадор</b> сражается верхом.", "ja": "<b>マタドール（エスパダ）：</b>主役。2頭を戦い仕留めます。<b>クアドリーリャ：</b>その配下——騎馬の<b>ピカドール</b>2名、<b>バンデリリェロ</b>3名（1名は<b>ペオン・デ・ブレガ</b>）。<b>モソ・デ・エスパダス：</b>道具の準備・受け渡し。<b>アルグアシリーリョ：</b>騎馬で議長と砂場をつなぎます。<b>プンティリェロ：</b>とどめを刺します。<b>騎馬闘牛</b>では<b>レホネアドール</b>が馬上で戦います。"}}, {"icon": "📣", "title": {"es": "En la plaza", "de": "In der Arena", "en": "In the ring", "ru": "На арене", "ja": "闘牛場にて"}, "body": {"es": "El aficionado premia con <b>olés</b> el buen toreo y muestra su desacuerdo con silencio o <b>pañuelos</b>. Está prohibido saltar al ruedo (los <b>espontáneos</b> son sancionados) y arrojar objetos. El respeto al toro bravo, a la <b>suerte</b> y al criterio de la presidencia forma parte de la fiesta. En Pamplona, la <b>Sobrepuerta</b> del <b>Tendido 1</b>, sobre el callejón del encierro, es el sitio de la <b>Peña Borussia</b>.", "de": "Der Aficionado belohnt gutes Toreo mit <b>Olés</b> und zeigt Missfallen durch Schweigen oder <b>Tücher</b>. Der Sprung in den Sand ist verboten (<b>Espontáneos</b> werden bestraft), ebenso das Werfen von Gegenständen. Respekt vor dem tapferen Stier, der <b>Suerte</b> und der Präsidentschaft gehört zum Fest. In Pamplona ist die <b>Sobrepuerta</b> des <b>Tendido 1</b>, über dem Encierro-Gang, der Platz der <b>Peña Borussia</b>.", "en": "Fans reward good bullfighting with <b>olés</b> and show disapproval with silence or <b>handkerchiefs</b>. Jumping into the ring is forbidden (<b>espontáneos</b> are punished), as is throwing objects. Respect for the brave bull, the <b>suerte</b> and the president's judgement is part of the fiesta. In Pamplona, the <b>Sobrepuerta</b> of <b>Tendido 1</b>, above the encierro passage, is the <b>Peña Borussia</b>'s spot.", "ru": "Знатоки награждают хорошее торео возгласами <b>olé</b> и выражают несогласие молчанием или <b>платками</b>. Прыгать на арену запрещено (<b>эспонтанеос</b> наказывают), как и бросать предметы. Уважение к храброму быку, к <b>суэрте</b> и к решению президиума — часть праздника. В Памплоне <b>Sobrepuerta</b> <b>Тендидо 1</b>, над проходом энсьерро, — место <b>Пеньи Боруссия</b>.", "ja": "愛好家は良い闘牛を<b>オーレ</b>で讃え、不満は沈黙や<b>ハンカチ</b>で示します。砂場への飛び込みは禁止（<b>エスポンターネオ</b>は処罰）、物を投げるのも禁止。勇敢な牛、<b>スエルテ</b>、議長の判断への敬意は祭りの一部です。パンプローナでは、牛追いの通路の上にある<b>テンディード1</b>の<b>Sobrepuerta</b>が<b>ペーニャ・ボルシア</b>の席です。"}}], LANGS=["es","de","en","ru","ja"];
function detectLang(){try{var s=localStorage.getItem('pb_lang');if(s&&UI.title[s])return s;}catch(e){}var n=(navigator.language||'es').slice(0,2).toLowerCase();return UI.title[n]?n:'es';}
var LANG=detectLang();
function setLang(l){LANG=l;try{localStorage.setItem('pb_lang',l);}catch(e){}render();}
function render(){
  document.documentElement.lang=LANG;
  document.getElementById('h-title').textContent=UI.title[LANG];
  document.getElementById('h-sub').textContent=UI.sub[LANG];
  document.getElementById('hero-t').textContent=UI.title[LANG];
  document.getElementById('hero-s').textContent=UI.sub[LANG];
  document.getElementById('back-t').textContent=UI.back[LANG];
  document.getElementById('disc').textContent=UI.disclaimer[LANG];
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.dataset.lang===LANG);});
  document.getElementById('sections').innerHTML=SEC.map(function(s){
    return '<div class="card"><h2><span class="ic">'+s.icon+'</span>'+s.title[LANG]+'</h2><div class="bd">'+s.body[LANG]+'</div></div>';
  }).join('');
}
document.getElementById('langbar').addEventListener('click',function(e){var b=e.target.closest('.lang-btn');if(b)setLang(b.dataset.lang);});
render();
</script>
</body>
</html>
