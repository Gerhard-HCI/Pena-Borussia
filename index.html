больших молодых фигур мирового рехонео. С двумя наваррцами на афише и опытом Картахены 6 июля бьётся с особым местным волнением.", "ja": "ナバラ色の濃い、一流の名を連ねた騎馬闘牛の番組です。ムルシア出身で故ヒネス・カルタヘナの甥アンディ・カルタヘナは、約30年にわたり最も華麗で世界を巡る騎手の一人であり、欧州・米州で成功を収めてきました。ナバラ人ロベルト・アルメンダリスはサンフェルミンの常連で、パンプローナを本拠地のひとつとしてきました。1999年エステーリャ生まれのギジェルモ・エルモソ・デ・メンドサは、伝説的なパブロ・エルモソ・デ・メンドサの息子であり後継者で、父を有名にした闘牛場で一族の旗を継ぎ、すでに世界の騎馬闘牛の若き大物の一人です。ナバラ勢2人とカルタヘナの経験で、7月6日は格別な郷土の情感に沸きます。"}}, {"tags": {"de": ["Blutlinie Juan Pedro Domecq", "Cádiz"], "en": ["Juan Pedro Domecq bloodline", "Cádiz"], "ru": ["Линия Хуан Педро Домек", "Кадис"], "ja": ["フアン・ペドロ・ドメック血統", "カディス"]}, "gan": {"de": "Fuente Ymbro ist eines der solidesten und meistgefragten Häuser des heutigen Stierkampfs und ein alter Bekannter Pamplonas, wo es vierzehn Jahre in Folge auftrat. Ricardo Gallardo gründete es 1996 mit Kühen und Vatertieren von Borja Domecq, dem damaligen Besitzer von Jandilla — sein Blut ist also reines Juan Pedro Domecq über die Jandilla-Linie. Darauf formte Gallardo einen Stier von rassiger Bravheit, mit Beweglichkeit, Tiefe und Wiederholung, der „nichts verschenkt“, aber den großen Triumph erlaubt. Er weidet in San José del Valle (Cádiz); seine Novilladas genießen hohes Ansehen. Angekündigt am großen Tag des San Fermín, dem 7. Juli, eröffnet die Corrida die acht großen Nachmittage mit einem ebenso rassigen wie edlen Stier.", "en": "Fuente Ymbro is one of the most solid and sought-after houses in today's bullfighting and an old friend of Pamplona, where it ran fourteen years in a row. Ricardo Gallardo founded it in 1996 with cows and stud bulls bought from Borja Domecq, then owner of Jandilla — so its blood is pure Juan Pedro Domecq via the Jandilla line. On that base Gallardo shaped a bull of pedigree bravery, with mobility, depth and repetition, that 'gives nothing away' yet allows the great triumph. It grazes in San José del Valle (Cádiz), and its novilladas are highly prized. Billed on San Fermín's great day, 7 July, the corrida opens the eight major afternoons with a bull as brave as it is noble.", "ru": "Фуэнте-Имбро — один из самых надёжных и востребованных домов современной корриды и старый знакомый Памплоны, где выступал четырнадцать лет подряд. Рикардо Гальярдо основал хозяйство в 1996 году на коровах и производителях, купленных у Борхи Домека, тогдашнего владельца Хандильи, — кровь чистого Хуан-Педро-Домека по линии Хандильи. На этой основе Гальярдо вывел быка породистой храбрости, подвижного, с глубиной и повторами, который «ничего не дарит», но позволяет большой триумф. Пасётся в Сан-Хосе-дель-Валье (Кадис); его новильяды высоко ценятся. Объявленная в главный день Сан-Фермина, 7 июля, эта коррида открывает восемь больших вечеров быком столь же храбрым, сколь и благородным.", "ja": "フエンテ・インブロは今日の闘牛で最も堅実かつ人気の高い牧場のひとつで、14年連続出場したパンプローナの古なじみです。リカルド・ガリャルドが1996年、当時ハンディーリャを所有していたボルハ・ドメックから牝牛と種牛を購入して創設したため、その血はハンディーリャ系を通じた純粋なフアン・ペドロ・ドメックです。これを基に、機動力・深み・繰り返しを備え、「何も与えない」が大成功を許す血統の勇敢な牛を作り上げました。サン・ホセ・デル・バリェ（カディス）で育ち、そのノビヤーダは高く評価されています。サン・フェルミンの大祭日7月7日に組まれ、勇敢かつ気高い牛で8つの大きな午後の幕を開けます。"}, "mat": {"de": "Plakat aus etabliertem Können und aufstrebender Jugend. Daniel Luque aus Gerena (Sevilla) ist heute einer der kraftvollsten und konstantesten Toreros, in voller Reife — auch wenn Pamplona seine Hingabe nicht immer belohnt hat. Ihm gegenüber zwei Werte, die sich in der Monumental vorstellen. Víctor Hernández aus der Alcarria (Madrid) ist eine der Offenbarungen des Moments: Nach drei Nachmittagen bei San Isidro 2026 gilt er als einer der vielversprechendsten jungen Toreros. Aarón Palacio, blutjung aus Saragossa, glänzte zunächst als Novillero und bestätigt nun seinen Sprung, gestützt von Figuren wie Morante. Am 7. Juli trifft Luques Können auf den Hunger zweier Aufsteiger.", "en": "A bill of established skill and rising youth. Daniel Luque, from Gerena (Seville), is today one of the most powerful and consistent matadors, in full maturity — though Pamplona hasn't always rewarded his commitment. Facing him, two talents presenting in the Monumental. Víctor Hernández, from the Alcarria (Madrid), is one of the revelations of the moment: after three afternoons at San Isidro 2026, he's rated among the most promising young matadors. Aarón Palacio, very young, from Zaragoza, first dazzled as a novillero and now confirms his step up, backed by figures like Morante. On 7 July, Luque's craft meets the hunger of two newcomers.", "ru": "Афиша состоявшегося мастерства и восходящей молодёжи. Даниэль Луке из Херены (Севилья) сегодня один из самых мощных и стабильных матадоров в полной зрелости, хотя Памплона не всегда вознаграждала его самоотдачу. Против него — двое, дебютирующих в «Монументаль». Виктор Эрнандес из Алькаррии (Мадрид) — одно из открытий момента: после трёх вечеров на Сан-Исидро 2026 его считают одним из самых перспективных молодых. Аарон Паласио, совсем юный, из Сарагосы, сперва блистал новильеро, а теперь подтверждает шаг вверх при поддержке таких фигур, как Моранте. 7 июля мастерство Луке встречает голод двух новичков.", "ja": "確かな実力と上り調子の若さの番組です。ヘレナ（セビーリャ）出身のダニエル・ルケは、今日最も力強く安定した闘牛士の一人で円熟の極みにありますが、パンプローナは必ずしも彼の献身に報いてきませんでした。これに対し、モヌメンタルにお目見えする2人。アルカリア（マドリード）出身のビクトル・エルナンデスは今最も注目される存在で、サン・イシドロ2026で3度出場し、最有望の若手と評されます。サラゴサ出身でごく若いアアロン・パラシオは、まず見習いとして輝き、モランテら大物の後押しで昇格を確かなものにしています。7月7日、ルケの技と2人の新鋭の渇望が相まみえます。"}}, {"tags": {"de": ["Eigene Blutlinie · Núñez", "Cádiz", "Torista · hart"], "en": ["Own bloodline · Núñez", "Cádiz", "Torista · tough"], "ru": ["Своя линия · Нуньес", "Кадис", "Ториста · жёсткая"], "ja": ["独自血統 · ヌニェス", "カディス", "硬派"]}, "gan": {"de": "Cebada Gago ist nach Miura die Zucht, die am häufigsten die Encierros von Pamplona gelaufen ist, und gilt als gefährlichste des Abos — die mit den meisten Hornstößen in den Gassen. 1963 von José Cebada Gago aus Carlos-Núñez-Tieren gegründet (später mit Jandilla und Torrestrella), bildete sie eine eigene Blutlinie mit vorherrschendem Núñez-Blut der Villamarta-Linie. Sie weidet in Medina Sidonia (Cádiz): ein niedriger, dünnhörniger Stier mit eindrucksvollem Gehörn, großer Fellvielfalt und temperamentvollen, harten Angriffen. Eine torista-Corrida, die keine halben Sachen duldet. Seit 1985 fast ohne Fehlen dabei; letztes Jahr stellte sie den bravsten Stier der Feria. Ihr Nachmittag, der 8. Juli, ist im Kalender des anspruchsvollen Aficionados rot markiert.", "en": "After Miura, Cebada Gago is the herd that has run Pamplona's encierros most often, and reputedly the most dangerous of the abono — the one that has gored most runners in the streets. Founded in 1963 by José Cebada Gago from Carlos Núñez stock (later with Jandilla and Torrestrella), it formed its own bloodline dominated by Núñez blood of the Villamarta line. It grazes in Medina Sidonia (Cádiz): a low, fine-horned bull with spectacular horns, great variety of coats and temperamental, hard charges. A torista corrida that allows no half-measures. Present almost without fail since 1985; last year it produced the feria's bravest bull. Its afternoon, 8 July, is circled in red for the demanding aficionado.", "ru": "После Миуры Себада-Гаго — ганадерия, чаще всех бежавшая энсьерро Памплоны, и слывущая самой опасной в абоно: на её счету больше всего ранений бегунов на улицах. Основана в 1963 году Хосе Себадой Гаго на быках Карлоса Нуньеса (позже Хандилья и Торрестрелья), образовав собственную линию с преобладанием крови Нуньес линии Вильямарта. Пасётся в Медина-Сидонии (Кадис): невысокий, тонкорогий бык с впечатляющими рогами, огромным разнообразием мастей и темпераментными, жёсткими атаками. Ториста-коррида, не терпящая полумер. Участвует почти без пропусков с 1985 года; в прошлом году дала самого храброго быка ферии. Её вечер, 8 июля, обведён красным у взыскательного знатока.", "ja": "ミウラに次いで、セバダ・ガゴはパンプローナの牛追いに最も多く登場した牧場で、アボノ随一の危険な存在——街路で最も多くの走者を突いた牧場として知られます。1963年にホセ・セバダ・ガゴがカルロス・ヌニェスの牛で創設し（のちハンディーリャ、トレストレーリャを加え）、ビリャマルタ系ヌニェスの血が優勢な独自血統を築きました。メディナ・シドニア（カディス）で育つ、背が低く角の細い牛で、見事な角、豊富な毛色、気性の荒い力強い突進が特徴です。中途半端を許さないトリスタ（硬派）の一戦。1985年以来ほぼ皆勤で、昨年はフェリア最勇の牛を出しました。7月8日のこの午後は、目の肥えた愛好家が赤丸を付ける日です。"}, "mat": {"de": "Junges, verdienstvolles Trio vor einem der härtesten Eisen des Abos. David Galván aus Cádiz stellt sich in Pamplona vor und tritt mit einer so fordernden Corrida wie Cebada Gago an. Román aus Valencia ist ein Espada hingebungsvoller Echtheit, der den Triumph in Pamplona schon kennt (Ohr in jüngsten Jahren). Doch der Name mit der größten emotionalen Last ist Manuel Diosleguarde aus Salamanca, der sich ebenfalls als Matador vorstellt — vor demselben Eisen, das ihn 2022 in Cuéllar fast das Leben kostete, als ein Cebada-Gago-Stier seine Oberschenkelarterie zerriss. Seine Rückkehr macht den Nachmittag zur Geschichte der Überwindung. Drei aufstrebende Toreros vor einem Stier, der kaum Fehler verzeiht: Emotion garantiert am 8. Juli.", "en": "A young, deserving trio before one of the abono's hardest brands. David Galván, from Cádiz, presents himself in Pamplona, facing a corrida as demanding as Cebada Gago. Román, from Valencia, is a swordsman of wholehearted authenticity who already knows triumph in Pamplona (an ear in recent years). But the name with the heaviest emotional charge is Manuel Diosleguarde, from Salamanca, also presenting as a matador — before the very brand that nearly cost him his life in Cuéllar in 2022, when a Cebada Gago bull tore his femoral artery. His return makes the afternoon a story of overcoming. Three rising matadors before a bull that forgives few errors: emotion guaranteed on 8 July.", "ru": "Молодая, достойная тройка перед одним из самых тяжёлых клейм абоно. Давид Гальван из Кадиса дебютирует в Памплоне против столь требовательной корриды, как Себада-Гаго. Роман из Валенсии — матадор беззаветной подлинности, уже знающий триумф в Памплоне (ухо в недавние годы). Но имя с наибольшим эмоциональным грузом — Мануэль Диослегуарде из Саламанки, также дебютирующий матадором, причём перед тем самым клеймом, что едва не стоило ему жизни в Куэльяре в 2022-м, когда бык Себада-Гаго разорвал ему бедренную артерию. Его возвращение делает вечер историей преодоления. Трое восходящих матадоров перед быком, прощающим мало ошибок: эмоции 8 июля гарантированы.", "ja": "アボノ屈指の手強い牧場に挑む、若く意欲ある3人。カディス出身のダビ・ガルバンはパンプローナにお目見えし、セバダ・ガゴという難敵に立ち向かいます。バレンシアのロマンは全身全霊の本物の闘牛士で、近年パンプローナでの成功（耳1枚）を知ります。しかし最も感情の重みを背負うのはサラマンカ出身のマヌエル・ディオスレグアルデで、彼もまたマタドールとしてお目見えし、しかも2022年クエリャルで命を奪いかけた——大腿動脈を裂いた——まさにその牧場の前に立ちます。その帰還は克服の物語です。失敗をほとんど許さぬ牛の前に、上り調子の3人。7月8日、感動は約束されています。"}}, {"tags": {"de": ["Domecq-Blutlinie", "Madrid", "+ Toros de Cortés"], "en": ["Domecq bloodline", "Madrid", "+ Toros de Cortés"], "ru": ["Линия Домек", "Мадрид", "+ Toros de Cortés"], "ja": ["ドメック血統", "マドリード", "+ トロス・デ・コルテス"]}, "gan": {"de": "Victoriano del Río — in Pamplona zusammen mit dem zweiten Eisen Toros de Cortés — ist eine der Lieblingszuchten der Stierkampf-Figuren. Der Madrider Unternehmer Victoriano del Río Cortés baute die Herde 1985 auf Domecq-Blut neu auf, mit Beiträgen von Jandilla und Torrestrella, bis ein eigener Typ entstand: brav, rassig, mit Klasse, Promptheit und vor allem Übertragung. Sie weidet in Guadalix de la Sierra (Madrid). Vor ihren Stieren gelangen El Juli, Manzanares, Talavante, Morante oder Roca Rey große Faenas. Es ist ein „torerista“-Eisen, für den Glanz des großen Toreros gedacht. Am 9. Juli, mit Spitzennamen im Plakat, verspricht der Nachmittag einen der künstlerischen Höhepunkte der Feria.", "en": "Victoriano del Río — in Pamplona alongside its second brand, Toros de Cortés — is one of the favourite herds of bullfighting's figures. The Madrid businessman Victoriano del Río Cortés rebuilt the herd in 1985 on Domecq blood, with input from Jandilla and Torrestrella, until a type of his own emerged: brave, pedigreed, with class, promptness and, above all, transmission. It grazes in Guadalix de la Sierra (Madrid). Before its bulls, El Juli, Manzanares, Talavante, Morante and Roca Rey have cut great faenas. It is a 'torerista' brand, designed for the great matador to shine. On 9 July, with top names on the bill, the afternoon promises one of the feria's artistic peaks.", "ru": "Викториано-дель-Рио — в Памплоне вместе со вторым клеймом Toros de Cortés — одна из любимых ганадерий звёзд корриды. Мадридский предприниматель Викториано дель Рио Кортес перестроил стадо в 1985 году на крови Домек, с вливаниями Хандильи и Торрестрельи, пока не возник собственный тип: храбрый, породистый, с классом, резвостью и, прежде всего, «передачей». Пасётся в Гуадаликс-де-ла-Сьерра (Мадрид). Перед его быками великие фаэны делали Эль-Хули, Мансанарес, Талаванте, Моранте и Рока Рей. Это клеймо «торериста», созданное для блеска большого матадора. 9 июля, с топ-именами на афише, вечер обещает один из художественных пиков ферии.", "ja": "ビクトリアノ・デル・リオは——パンプローナでは第2の牧場トロス・デ・コルテスと共に——闘牛のスター達に好まれる牧場のひとつです。マドリードの実業家ビクトリアノ・デル・リオ・コルテスが1985年、ドメックの血で再建し、ハンディーリャやトレストレーリャを加えて独自の型を生みました。勇敢で血統正しく、品位・素早さ、そして何より「伝わる力」を備えます。グアダリクス・デ・ラ・シエラ（マドリード）で育ちます。エル・フリ、マンサナーレス、タラバンテ、モランテ、ロカ・レイらが名演を残しました。大闘牛士を輝かせる「トレリスタ」の牧場です。7月9日、豪華な顔ぶれで、フェリア屈指の芸術的頂点が期待されます。"}, "mat": {"de": "Einer der großen Nachmittage des Abos. Alejandro Talavante aus der Extremadura ist einer der begabtesten und persönlichsten Toreros seiner Generation; nach seiner Rückkehr in voller künstlerischer Reife. Andrés Roca Rey, der Peruaner und heute größte internationale Figur des Stierkampfs, macht den ersten seiner zwei Auftritte — als Einziger an zwei Tagen angekündigt: überwältigender Mut, Dominanz und eine Verbindung zum Publikum, die Arenen füllt; in Pamplona schon mehrfach durch die Puerta Grande. David de Miranda aus Huelva debütiert in der Monumental, nachdem er zum Triumphator der Feria de Abril Sevilla 2026 erklärt wurde. Mit Victoriano del Río vereint der 9. Juli Kunst, Kraft und einen aufstrebenden Wert.", "en": "One of the abono's great afternoons. Alejandro Talavante, from Extremadura, is among the most gifted and personal matadors of his generation; since his return, in full artistic maturity. Andrés Roca Rey, the Peruvian who is today bullfighting's greatest international figure, makes the first of his two appearances — the only one billed twice: overwhelming valour, command and a bond with the public that fills rings; in Pamplona, already through the Puerta Grande several times. David de Miranda, from Huelva, debuts in the Monumental after being named triumphador of Seville's 2026 Feria de Abril. With Victoriano del Río, 9 July unites art, power and a rising talent.", "ru": "Один из больших вечеров абоно. Алехандро Талаванте из Эстремадуры — среди самых одарённых и самобытных матадоров своего поколения; после возвращения — в полной художественной зрелости. Андрес Рока Рей, перуанец и сегодня крупнейшая международная фигура корриды, выходит впервые из двух своих выступлений — единственный, заявленный дважды: подавляющая смелость, господство и связь с публикой, наполняющая арены; в Памплоне уже не раз выходил через Пуэрта-Гранде. Давид де Миранда из Уэльвы дебютирует в «Монументаль» после титула триумфатора Севильской Ферии-де-Абриль 2026. С Викториано-дель-Рио 9 июля соединяет искусство, мощь и восходящий талант.", "ja": "アボノ屈指の大舞台。エストレマドゥーラ出身のアレハンドロ・タラバンテは同世代で最も才能豊かで個性的な闘牛士の一人で、復帰後は芸術的円熟の極みにあります。アンドレス・ロカ・レイは、今日の闘牛で最大の国際的スターであるペルー人で、唯一2日出場する中の初登場です。圧倒的な勇気、支配力、闘牛場を満員にする観客との絆を備え、パンプローナでも何度もプエルタ・グランデ（大門凱旋）を果たしています。ウエルバ出身のダビ・デ・ミランダは、2026年セビーリャ春祭りの優勝者に選ばれ、モヌメンタルにデビューします。ビクトリアノ・デル・リオと共に、7月9日は芸術・力・新鋭が結びつきます。"}}, {"tags": {"de": ["Núñez-Blutlinie", "Cádiz", "Junges Eisen"], "en": ["Núñez bloodline", "Cádiz", "Young brand"], "ru": ["Линия Нуньес", "Кадис", "Молодое клеймо"], "ja": ["ヌニェス血統", "カディス", "新興牧場"]}, "gan": {"de": "Álvaro Núñez ist das jüngste Eisen des Abos und eine der großen Attraktionen der letzten Zeit. Der Züchter Álvaro Núñez aus dem historischen Hause Núñez verfeinerte diese Herde der Núñez-Blutlinie auf seinen Gütern um Vejer und Tarifa (Cádiz) und brachte sie 2025 erstmals zur Feria del Toro — mit sofortigem Erfolg: Mit diesem Eisen gelang Morante de la Puebla seine erste Puerta Grande in Pamplona, weshalb der Maestro nun wiederkommt. Der Núñez-Stier sucht Präsenz, Bravheit und Reichweite für den Glanz der Figuren. Der 10. Juli, mit Morante an der Spitze, ist einer der erwartetsten und künstlerischsten Nachmittage der Feria.", "en": "Álvaro Núñez is the abono's youngest brand and one of its great recent attractions. The breeder Álvaro Núñez, of the historic Núñez house, refined this Núñez-bloodline herd on his estates around Vejer and Tarifa (Cádiz) and brought it to the Feria del Toro in 2025 — with instant success: with this brand Morante de la Puebla earned his first Puerta Grande in Pamplona, which is why the maestro returns. The Núñez bull seeks presence, bravery and range for the figures to shine. On 10 July, with Morante heading the bill, it is one of the most awaited and artistic afternoons of the feria.", "ru": "Альваро Нуньес — самое молодое клеймо абоно и одна из главных недавних его приманок. Заводчик Альваро Нуньес из исторического дома Нуньес отшлифовал это стадо линии Нуньес в своих владениях у Вехера и Тарифы (Кадис) и впервые привёл на Ферия-дель-Торо в 2025-м — с мгновенным успехом: с этим клеймом Моранте де ла Пуэбла добыл свою первую Пуэрта-Гранде в Памплоне, потому маэстро и возвращается. Бык Нуньеса ищет presence, храбрость и ход для блеска звёзд. 10 июля, с Моранте во главе афиши, — один из самых ожидаемых и художественных вечеров ферии.", "ja": "アルバロ・ヌニェスはアボノ最年少の牧場で、近年の大きな目玉のひとつです。名門ヌニェス家の牧場主アルバロ・ヌニェスが、ベヘルとタリファ（カディス）周辺の所領でヌニェス血統のこの牛を磨き、2025年に初めてフェリア・デル・トロへ持ち込み、たちまち成功を収めました。モランテ・デ・ラ・プエブラはこの牧場でパンプローナ初のプエルタ・グランデを果たし、それゆえ名匠が再登板します。ヌニェスの牛は、スターを輝かせる存在感・勇敢さ・伸びを追求します。モランテを筆頭に据えた7月10日は、フェリアで最も待たれる芸術的な午後のひとつです。"}, "mat": {"de": "Sevillanischer Nachmittag von höchster Kunst. José Antonio Morante de la Puebla ist der einflussreichste und persönlichste Torero des 21. Jahrhunderts, ein reiner Künstler, der die Zeit anhalten kann; seine Rückkehr nach San Fermín, wo er letztes Jahr mit Álvaro Núñez die Puerta Grande öffnete, ist eines der großen Ereignisse des Abos. Ihn begleiten zwei Landsleute von tiefstem Geschmack. Pablo Aguado verkörpert ein Toreo aus Kadenz, Temple und Reinheit. Borja Jiménez aus Espartinas erlebt seinen Durchbruch: regelmäßig, mutig und kraftvoll, mit großen Triumphen in Sevilla. Mit den edlen Núñez-Stieren vereint der 10. Juli drei Toreros der sevillanischen Schule — Kunst, Temple und Hingabe.", "en": "A Sevillian afternoon of the highest art. José Antonio Morante de la Puebla is the most influential and personal matador of the 21st century, a pure artist able to stop time; his return to San Fermín, where last year he opened the Puerta Grande with Álvaro Núñez, is one of the abono's great events. He is joined by two countrymen of the deepest taste. Pablo Aguado embodies a bullfighting of cadence, temple and purity. Borja Jiménez, from Espartinas, is having his breakthrough: consistent, brave and powerful, with resounding triumphs in Seville. With the noble Núñez bulls, 10 July unites three matadors of the Sevillian school — art, temple and commitment.", "ru": "Севильский вечер высшего искусства. Хосе Антонио Моранте де ла Пуэбла — самый влиятельный и самобытный матадор XXI века, чистый художник, умеющий остановить время; его возвращение в Сан-Фермин, где в прошлом году он открыл Пуэрта-Гранде с Альваро Нуньесом, — одно из больших событий абоно. Его сопровождают двое земляков тончайшего вкуса. Пабло Агуадо воплощает торео каданса, темпа и чистоты. Борха Хименес из Эспартинаса переживает прорыв: стабильный, смелый и мощный, с громкими триумфами в Севилье. С благородными быками Нуньеса 10 июля соединяет троих матадоров севильской школы — искусство, темп и самоотдачу.", "ja": "最高の芸術が薫るセビーリャの午後。ホセ・アントニオ・モランテ・デ・ラ・プエブラは21世紀で最も影響力があり個性的な闘牛士で、時を止められる純粋な芸術家です。昨年アルバロ・ヌニェスでプエルタ・グランデを開けたサンフェルミンへの帰還は、アボノの大事件のひとつ。共に出るのは、極上の趣味を持つ同郷の2人。パブロ・アグアドは律動と「テンプレ（呼吸）」、純度の闘牛を体現します。エスパルティナス出身のボルハ・ヒメネスは飛躍の時を迎え、安定して勇敢かつ力強く、セビーリャで大成功を収めています。気高いヌニェスの牛と共に、7月10日はセビーリャ派の3人——芸術・テンプレ・献身——を結びます。"}}, {"tags": {"de": ["Albaserrada-Blutlinie", "Ávila", "Torista · hart"], "en": ["Albaserrada bloodline", "Ávila", "Torista · tough"], "ru": ["Линия Альбасеррада", "Авила", "Ториста · жёсткая"], "ja": ["アルバセラーダ血統", "アビラ", "硬派"]}, "gan": {"de": "José Escolar Gil ist die große torista-Bastion des Abos. 1981 mit Tieren von Victorino Martín gegründet, bewahrte sie ausschließlich das seltene Blut der Albaserrada-Linie, einer der eigenständigsten und ernstesten des Kampfstiers. Sie weidet in Lanzahíta (Ávila): ein Stier von eindrucksvoller Präsenz, länglichem Kopf, entwickeltem, offensivem Gehörn und meist kardenfarbenem Fell. Eine harte, rassige, fordernde Corrida, die — so der Züchter — „nicht das Gute, sondern die Wahrheit sucht“ und sich die strengsten Aficionados Madrids, Frankreichs und Pamplonas erobert hat. Escolar ist der Stier des Toreros von Rasse, der Technik und Hingabe verlangt. Sein Nachmittag, der 11. Juli, ist eine der Markierungen des torista-Liebhabers.", "en": "José Escolar Gil is the abono's great torista bastion. Founded in 1981 with Victorino Martín stock, it kept only the rare blood of the Albaserrada line, one of the most distinctive and serious of the fighting bull. It grazes in Lanzahíta (Ávila): a bull of imposing presence, long head, developed, offensive horns and mostly cárdeno coats. A hard, pedigreed, demanding corrida that, in the breeder's words, 'does not seek the good but the truth', and has won over the strictest aficionados of Madrid, France and Pamplona. Escolar is the bull of the matador of race, demanding technique and commitment. Its afternoon, 11 July, is one of the torista lover's red-letter days.", "ru": "Хосе Эскольяр Хиль — великий ториста-бастион абоно. Основанная в 1981 году на быках Викторино Мартина, она сохранила лишь редкую кровь линии Альбасеррада — одной из самых самобытных и серьёзных у боевого быка. Пасётся в Лансаите (Авила): бык внушительного облика, с удлинённой головой, развитыми наступательными рогами и преимущественно карденовой мастью. Жёсткая, породистая, требовательная коррида, которая, по словам заводчика, «ищет не хорошее, а правду», и покорила строжайших знатоков Мадрида, Франции и Памплоны. Эскольяр — бык матадора породы, требующий техники и самоотдачи. Его вечер, 11 июля, — один из красных дней любителя-тористы.", "ja": "ホセ・エスコラル・ヒルはアボノ随一のトリスタ（硬派）の砦です。1981年にビクトリノ・マルティンの牛で創設し、闘牛の中でも最も個性的で厳格なアルバセラーダ系の希少な血のみを残しました。ランサイタ（アビラ）で育つ、堂々たる存在感の牛で、細長い頭、発達した攻撃的な角、多くは灰褐色（カルデノ）の毛色を持ちます。硬く、血統正しく、手強い一戦で、牧場主いわく「良さではなく真実を求める」牛は、マドリード・フランス・パンプローナの最も厳しい愛好家を魅了してきました。エスコラルは、技術と献身を要求する「血の闘牛士」の牛です。7月11日のこの午後は、トリスタ愛好家が赤丸を付ける一日です。"}, "mat": {"de": "Plakat von Toreros mit Tiefe für eine harte Corrida. Antonio Ferrera aus der Extremadura ist einer der vollständigsten, mutigsten und persönlichsten Matadore der letzten Jahrzehnte, anerkannter Spezialist für die respekteinflößendsten Zuchten — vor dem Escolar eine Garantie. Dazu zwei amerikanische Espadas. Juan de Castilla, Kolumbianer, „kam nach Pamplona, um zu bleiben“: Er debütierte mit Ohr und bestätigte ein Toreo stiller Echtheit und Anstrengung. Isaac Fonseca, Mexikaner, verkörpert die neue amerikanische Generation, die sich dem ganzen Stier ohne Komplexe stellt; nach Verletzungen will er sich rehabilitieren. Eines der konzeptuell dichtesten Plakate der Feria, wo sich ein Torero vor dem kundigsten Publikum legitimieren kann.", "en": "A bill of matadors with depth for a hard corrida. Antonio Ferrera, from Extremadura, is one of the most complete, brave and personal matadors of recent decades, a recognised specialist in the most fearsome herds — before the Escolar, a guarantee. With him, two American swordsmen. Juan de Castilla, Colombian, 'came to Pamplona to stay': he debuted with an ear and confirmed a bullfighting of quiet authenticity and effort. Isaac Fonseca, Mexican, embodies the new American generation that faces the whole bull without complexes; after injuries, he wants to vindicate himself. One of the feria's most conceptually dense bills, where a matador can prove himself before the most knowledgeable crowd.", "ru": "Афиша матадоров с глубиной для жёсткой корриды. Антонио Феррера из Эстремадуры — один из самых полноценных, смелых и самобытных матадоров последних десятилетий, признанный специалист по самым грозным ганадериям; перед Эскольяром — гарантия. С ним двое американских матадоров. Хуан де Кастилья, колумбиец, «приехал в Памплону, чтобы остаться»: дебютировал с ухом и подтвердил торео тихой подлинности и труда. Исаак Фонсека, мексиканец, воплощает новое американское поколение, что без комплексов встречает цельного быка; после травм хочет реабилитироваться. Одна из самых концептуально плотных афиш ферии, где матадор может утвердиться перед самой знающей публикой.", "ja": "硬い一戦に深みある闘牛士を揃えた番組です。エストレマドゥーラ出身のアントニオ・フェレーラは、近年で最も完成度が高く勇敢で個性的なマタドールの一人で、最も恐れられる牧場の名手として知られ、エスコラルの前では頼れる存在です。共に出るのは2人のアメリカ大陸の闘牛士。コロンビアのフアン・デ・カスティーリャは「居つくためにパンプローナへ来た」と言われ、耳1枚でデビューし、静かな本物さと努力の闘牛を示しました。メキシコのイサーク・フォンセカは、完全な牛に臆せず立ち向かう新世代の象徴で、負傷を経て雪辱を期します。最も目の肥えた観客の前で闘牛士が真価を示せる、フェリア屈指の濃密な番組です。"}}, {"tags": {"de": ["Domecq-Blutlinie · Osborne", "Cádiz · Tarifa"], "en": ["Domecq bloodline · Osborne", "Cádiz · Tarifa"], "ru": ["Линия Домек · Осборн", "Кадис · Тарифа"], "ja": ["ドメック血統 · オスボルネ", "カディス · タリファ"]}, "gan": {"de": "La Palmosilla ist eine der jüngsten Entdeckungen Pamplonas. 1996 von der Familie Núñez — José Javier Núñez Cervera und Sohn Javier — mit Tieren von Juan Pedro Domecq und Núñez del Cuvillo (Osborne-Linie) gegründet, auf einem Züchternamen der Núñez aus Tarifa mit über zweieinhalb Jahrhunderten Geschichte. Sie weidet in Tarifa (Cádiz): ein Domecq-Stier von großer Buntheit, eindrucksvoll, kräftig und breitbrüstig. Debütierte 2019 in der Feria del Toro als Ersatz für Fuente Ymbro — mit sofortigem Erfolg: bravster Stier (Carriquiri-Preis), 2022 Preis für die kompletteste Corrida. Seither fester Bestandteil, mit schnellen, beweglichen Stieren. Der 12. Juli bietet ein junges, aber bewährtes Eisen, das vom großen Werk träumen lässt.", "en": "La Palmosilla is one of Pamplona's recent discoveries. Founded in 1996 by the Núñez family — José Javier Núñez Cervera and his son Javier — with stock from Juan Pedro Domecq and Núñez del Cuvillo (Osborne line), on a Tarifa Núñez breeding name with over two and a half centuries of history. It grazes in Tarifa (Cádiz): a Domecq bull of great colour variety, imposing, powerful and broad-chested. It debuted in the 2019 Feria del Toro replacing Fuente Ymbro — with instant success: bravest bull (Carriquiri prize), and in 2022 the prize for the most complete corrida. A fixture ever since, with fast, mobile bulls. On 12 July it offers a young but proven brand that lets you dream of the great faena.", "ru": "Ла-Пальмосилья — одно из недавних открытий Памплоны. Основана в 1996 году семьёй Нуньес — Хосе Хавьер Нуньес Сервера и сын Хавьер — на быках Хуан Педро Домек и Нуньес дель Кувильо (линия Осборн), на тарифском заводском имени Нуньес с историей более двух с половиной веков. Пасётся в Тарифе (Кадис): бык Домек большой пестроты мастей, внушительный, мощный, широкогрудый. Дебютировала на Ферия-дель-Торо 2019, заменив Фуэнте-Имбро, — с мгновенным успехом: храбрейший бык (приз Carriquiri), а в 2022-м приз за самую полную корриду. С тех пор завсегдатай, с быстрыми, подвижными быками. 12 июля — молодое, но проверенное клеймо, позволяющее мечтать о большой фаэне.", "ja": "ラ・パルモシーリャはパンプローナ近年の発見のひとつです。1996年、ヌニェス家——ホセ・ハビエル・ヌニェス・セルベラと息子ハビエル——が、フアン・ペドロ・ドメックとヌニェス・デル・クビーリョ（オスボルネ系）の牛で創設し、2世紀半超の歴史を持つタリファのヌニェスの名を継ぎます。タリファ（カディス）で育つ、毛色豊かなドメックの牛で、堂々として力強く胸幅が広いのが特徴です。2019年フェリア・デル・トロでフエンテ・インブロの代役として登場し、たちまち成功——最勇の牛（カリキリ賞）、2022年には最完成度のコリーダ賞。以来の常連で、速く機動的な牛を出します。7月12日、若いが実績ある牧場が、名演の夢を抱かせます。"}, "mat": {"de": "Plakat aus Erfahrung, Mut und triumphaler Jugend. Saúl Jiménez Fortes aus Málaga ist ein Torero von Rasse und extremem Mut, Spezialist im Spiel mit dem Leben vor den ernstesten Zuchten; er wiederholt mit La Palmosilla nach seinem Triumph im Vorjahr. Fernando Adrián aus Madrid war einer der großen Triumphatoren von San Fermín 2025 — er öffnete die Puerta Grande — und kehrt bestätigt zurück. Samuel Navalón, blutjung aus Valencia, debütiert in der Monumental: Fallas-Triumphator und frisch promoviert, eines der vielversprechendsten Talente. Mit den beweglichen Palmosilla-Stieren trifft am 12. Juli grenzenlose Hingabe auf das Vertrauen des Triumphators und den Hunger des Debütanten.", "en": "A bill of experience, valour and triumphant youth. Saúl Jiménez Fortes, from Málaga, is a matador of race and extreme courage, a specialist in risking his life before the most serious herds; he repeats with La Palmosilla after last year's triumph. Fernando Adrián, from Madrid, was one of the great triumphadores of San Fermín 2025 — he opened the Puerta Grande — and returns confirmed. Samuel Navalón, very young, from Valencia, debuts in the Monumental: a Fallas triumphador and newly promoted, one of the most promising talents. With the mobile Palmosilla bulls, 12 July pits boundless commitment against the triumphador's confidence and the debutant's hunger.", "ru": "Афиша опыта, смелости и триумфальной молодёжи. Сауль Хименес Фортес из Малаги — матадор породы и крайней храбрости, мастер рисковать жизнью перед самыми серьёзными ганадериями; повторяет с Ла-Пальмосильей после прошлогоднего триумфа. Фернандо Адриан из Мадрида был одним из больших триумфаторов Сан-Фермина 2025 — открыл Пуэрта-Гранде — и возвращается утверждённым. Самуэль Навалон, совсем юный, из Валенсии, дебютирует в «Монументаль»: триумфатор Фальяс и недавно посвящённый, один из самых перспективных. С подвижными быками Пальмосильи 12 июля сталкивает безграничную самоотдачу с уверенностью триумфатора и голодом дебютанта.", "ja": "経験・勇気・栄光の若さの番組です。マラガ出身のサウル・ヒメネス・フォルテスは、血の気盛んで極めて勇敢な闘牛士で、最も手強い牧場の前で命を賭ける名手。昨年の成功を受けてラ・パルモシーリャと再び臨みます。マドリードのフェルナンド・アドリアンは、サンフェルミン2025の大優勝者の一人で——プエルタ・グランデを開け——実績を携えて戻ります。バレンシア出身でごく若いサムエル・ナバロンはモヌメンタルにデビュー。ファリャスの優勝者で昇格したばかり、最有望の才能の一人です。機動的なパルモシーリャの牛と共に、7月12日は、限りない献身、優勝者の自信、新人の渇望がぶつかります。"}}, {"tags": {"de": ["Eigene Blutlinie", "Sevilla · Zahariche", "Legende"], "en": ["Own bloodline", "Seville · Zahariche", "Legend"], "ru": ["Своя линия", "Севилья · Сахариче", "Легенда"], "ja": ["独自血統", "セビーリャ · サアリチェ", "伝説"]}, "gan": {"de": "Miura ist die lebende Legende des Stierkampfs. 1842 von Juan Miura in Sevilla gegründet, züchtet sie auf dem Gut Zahariche (Lora del Río) einen einzigartigen Stier eigenen Encaste — größer, länger, dünnhörnig und mit „Sentido“, jenem Lernen während des Kampfes, das ihn so gefährlich macht. Ihre grün-schwarze Devise flößt Respekt ein; der Satz „die Miuras töten mehr Toreros“, populär nach Manoletes Tod 1947, schuf eine schwarze Legende, die das Eisen paradox vergrößerte. Es ist die meistprämierte Zucht der Feria und die mit den meisten Encierro-Auftritten. 2026 schließt Miura nicht mehr die Feria, sondern rückt auf Montag, den 13. Juli, vor. Heute führen die Brüder Antonio und Eduardo Miura das Haus mit demselben Kriterium: Persönlichkeit, Integrität und Casta.", "en": "Miura is the living legend of bullfighting. Founded in 1842 by Juan Miura in Seville, on the Zahariche estate (Lora del Río) it breeds a unique bull of its own encaste — taller, longer, fine-horned and with 'sentido', that learning during the fight which makes it so dangerous. Its green-and-black colours command respect; the phrase 'Miuras kill more bullfighters', popular after Manolete's death in 1947, forged a black legend that paradoxically enlarged the brand. It is the feria's most awarded herd and the one most often in the encierro. In 2026, Miura no longer closes the feria but moves up to Monday 13 July. Today brothers Antonio and Eduardo Miura run the house with the same criterion: personality, integrity and casta.", "ru": "Миура — живая легенда корриды. Основанная в 1842 году Хуаном Миурой в Севилье, на поместье Сахариче (Лора-дель-Рио) она разводит уникального быка собственного энкасте — выше, длиннее, тонкорогого и с «sentido», тем обучением по ходу боя, что делает его столь опасным. Её зелёно-чёрные цвета внушают уважение; фраза «Миуры убивают больше тореро», популярная после гибели Манолете в 1947-м, создала чёрную легенду, парадоксально возвеличившую клеймо. Это самая титулованная ганадерия ферии и чаще всех бегущая энсьерро. В 2026-м Миура больше не закрывает ферию, а сдвигается на понедельник 13 июля. Сегодня дом ведут братья Антонио и Эдуардо Миура с прежним кредо: индивидуальность, цельность и каста.", "ja": "ミウラは闘牛の生ける伝説です。1842年にフアン・ミウラがセビーリャで創設し、サアリチェ牧場（ロラ・デル・リオ）で独自血統の唯一無二の牛を育てます。より背が高く、長身で、角が細く、戦いの最中に学習する「センティード」を備え、それが危険さの源です。緑と黒の標章は畏敬を呼び、1947年のマノレーテの死後に広まった「ミウラは闘牛士をより多く殺す」の言葉が、逆説的に名声を高めた黒い伝説を生みました。フェリア最多受賞の牧場で、牛追いにも最も多く登場します。2026年、ミウラはフェリアを締めくくらず、月曜の7月13日に繰り上がります。今日はアントニオとエドゥアルド・ミウラ兄弟が、個性・高潔さ・カスタという従来の基準で牧場を守ります。"}, "mat": {"de": "Trio von Spezialisten für das gefürchtetste Eisen. Manuel Escribano aus Sevilla ist einer der mutigsten und spezifischsten Toreros vor harten Zuchten — Banderillero von Kraft und Matador von Wagemut, ein Stammgast der Miuras in Pamplona. Pepe Moral aus Los Palacios (Sevilla) hat eine Laufbahn der Hingabe vor dem ernsten Stier geschmiedet; letztes Jahr schnitt er mit Cebada Gago in San Fermín ein Ohr. Doch der Publikumsliebling des Nachmittags ist Jesús Enrique Colombo, Venezolaner aus San Cristóbal und Matadorensohn: 2024 verließ er die Arena auf den Schultern, nachdem er den Miuras zwei Ohren geschnitten hatte. Am 13. Juli, mit den Zahariche-Stieren, einer der Nachmittage mit der meisten Casta und Dramatik.", "en": "A trio of specialists for the most feared brand. Manuel Escribano, from Seville, is one of the bravest and most specific matadors before hard herds — a banderillero of power and a matador of daring, a regular of the Miuras in Pamplona. Pepe Moral, from Los Palacios (Seville), has built a career of commitment before the serious bull; last year he cut an ear from Cebada Gago at San Fermín. But the afternoon's crowd favourite is Jesús Enrique Colombo, Venezuelan from San Cristóbal and son of a matador: in 2024 he left on shoulders after cutting two ears from the Miuras. On 13 July, with the Zahariche bulls, one of the afternoons of most casta and drama.", "ru": "Тройка специалистов по самому грозному клейму. Мануэль Эскрибано из Севильи — один из самых смелых и «профильных» матадоров перед тяжёлыми ганадериями: бандерильеро мощи и матадор отваги, завсегдатай Миур в Памплоне. Пепе Мораль из Лос-Паласьоса (Севилья) выстроил карьеру самоотдачи перед серьёзным быком; в прошлом году отрезал ухо у Себада-Гаго на Сан-Фермине. Но любимец публики этого вечера — Хесус Энрике Коломбо, венесуэлец из Сан-Кристобаля и сын матадора: в 2024-м его вынесли на плечах после двух ушей у Миур. 13 июля, с быками Сахариче, — один из вечеров наибольшей касты и драматизма.", "ja": "最も恐れられる牧場に挑む専門家3人。セビーリャ出身のマヌエル・エスクリバノは、硬い牧場の前で最も勇敢で専門性の高い闘牛士の一人——力強いバンデリリェロにして大胆なマタドールで、パンプローナのミウラの常連です。ロス・パラシオス（セビーリャ）出身のペペ・モラルは、手強い牛の前での献身でキャリアを築き、昨年サンフェルミンでセバダ・ガゴから耳1枚を切りました。しかしこの午後の観客の人気者は、サン・クリストバル出身で闘牛士の息子、ベネズエラ人のヘスス・エンリケ・コロンボです。2024年、ミウラから耳2枚を切って肩車で退場しました。7月13日、サアリチェの牛と共に、最もカスタと劇性に満ちた午後のひとつです。"}}, {"tags": {"de": ["Domecq-Blutlinie", "Badajoz", "+ Vegahermosa"], "en": ["Domecq bloodline", "Badajoz", "+ Vegahermosa"], "ru": ["Линия Домек", "Бадахос", "+ Vegahermosa"], "ja": ["ドメック血統", "バダホス", "+ ベガエルモサ"]}, "gan": {"de": "Jandilla schließt die Feria del Toro 2026. Direkte Erbin des 1930 von Juan Pedro Domecq gegründeten Hauses, wurde sie in den 80ern von Borja Domecq Solís neu geformt — zu einer der Säulen des Domecq-Encaste und zur genetischen Basis zahlloser heutiger Zuchten (Fuente Ymbro, Victoriano del Río, El Pilar…). In Pamplona kämpft sie mit ihrem Schwestereisen Vegahermosa. Ein Stier mittlerer Größe, langhalsig, edel mit Bravheits-Tiefe und vor allem großer Übertragung und Dauer im letzten Drittel: Casta mit Klasse. Borja Domecq lernte, dass „der Stier von Pamplona nicht gemacht wird, er wird geboren“ mit dem nötigen Typ. Seit den 90ern ein Klassiker. 2026 setzt sie am Dienstag, den 14. Juli, den Schlusspunkt — die letzte große Stierkampftarde vor dem Pobre de Mí.", "en": "Jandilla closes the 2026 Feria del Toro. Direct heir of the house founded by Juan Pedro Domecq in 1930, it was reshaped in the 1980s by Borja Domecq Solís into one of the pillars of the Domecq encaste and the genetic base of countless herds today (Fuente Ymbro, Victoriano del Río, El Pilar…). In Pamplona it fights with its sister brand Vegahermosa. A bull of medium height, long-necked, noble with depth of bravery and, above all, great transmission and durability in the final third: casta with class. Borja Domecq learned that 'the Pamplona bull is not made, it is born' with the right type. A classic since the 1990s. In 2026 it sets the finale on Tuesday 14 July — the last great bullfighting afternoon before the Pobre de Mí.", "ru": "Хандилья закрывает Ферия-дель-Торо 2026. Прямая наследница дома, основанного Хуаном Педро Домеком в 1930-м, в 80-е переформирована Борхой Домеком Солисом в один из столпов энкасте Домек и генетическую основу множества нынешних ганадерий (Фуэнте-Имбро, Викториано-дель-Рио, Эль-Пилар…). В Памплоне сражается с родственным клеймом Вегаэрмоса. Бык средней высоты, длинношеий, благородный с глубиной храбрости и, прежде всего, большой «передачей» и выносливостью в последней трети: каста с классом. Борха Домек усвоил, что «памплонского быка не делают, он рождается» с нужным типом. Классик с 90-х. В 2026-м ставит точку во вторник 14 июля — последний большой вечер корриды перед Pobre de Mí.", "ja": "ハンディーリャが2026年フェリア・デル・トロを締めくくります。1930年にフアン・ペドロ・ドメックが創設した牧場の直系で、1980年代にボルハ・ドメック・ソリスが作り直し、ドメック血統の柱のひとつ、そして今日の数多の牧場（フエンテ・インブロ、ビクトリアノ・デル・リオ、エル・ピラル…）の遺伝的母体となりました。パンプローナでは姉妹牧場ベガエルモサと共に戦います。中背で首が長く、気高く勇敢さの深みがあり、何より終盤の「伝わる力」と持続力に優れる、品位あるカスタの牛です。ボルハ・ドメックは「パンプローナの牛は作るのではなく、ふさわしい型で生まれる」と学びました。1990年代以来の常連で、2026年は7月14日（火）に幕を引きます——「ポブレ・デ・ミ」前、最後の大きな闘牛の午後です。"}, "mat": {"de": "Abschlussplakat mit drei Figuren und maximalem Zug. Juan Ortega aus Sevilla ist einer der elegantesten und künstlerischsten Toreros, von klassischem Konzept und erlesenem Temple; 2026 führt er zeitweise das Ranking nach Auftritten an. Andrés Roca Rey, die weltgrößte Figur, macht seinen zweiten Auftritt der Feria — als Einziger zweimal angekündigt — und stellt Mut, Dominanz und Elektrizität in den Dienst des Finales; in Pamplona schon mehrfach durch die Puerta Grande. Tomás Rufo aus Toledo vervollständigt ein Luxus-Trio: ernst, kraftvoll und in voller Konsolidierung, einer der jüngsten Triumphatoren von San Fermín. Mit Jandilla und Vegahermosa will der 14. Juli die Feria krönen.", "en": "A closing bill with three figures and maximum pull. Juan Ortega, from Seville, is one of the most elegant and artistic matadors, of classical concept and exquisite temple; in 2026 he has at times led the ranking by appearances. Andrés Roca Rey, the world's greatest figure, makes his second appearance of the feria — the only one billed twice — putting valour, command and electricity at the service of the finale; in Pamplona, already through the Puerta Grande several times. Tomás Rufo, from Toledo, completes a luxury trio: serious, powerful and fully consolidating, one of San Fermín's recent triumphadores. With Jandilla and Vegahermosa, 14 July aims to crown the feria.", "ru": "Закрывающая афиша с тремя фигурами и максимальной тягой. Хуан Ортега из Севильи — один из самых элегантных и художественных матадоров, классического концепта и изысканного темпа; в 2026-м временами возглавлял рейтинг по числу выступлений. Андрес Рока Рей, крупнейшая фигура мира, выходит во второй раз за ферию — единственный, заявленный дважды — отдавая смелость, господство и электричество финалу; в Памплоне уже не раз через Пуэрта-Гранде. Томас Руфо из Толедо завершает роскошную тройку: серьёзный, мощный и закрепляющийся в элите, один из недавних триумфаторов Сан-Фермина. С Хандильей и Вегаэрмосой 14 июля стремится короновать ферию.", "ja": "3人のスターと最大級の集客力を備えた閉幕番組です。セビーリャ出身のフアン・オルテガは、古典的な発想と精妙なテンプレを持つ最も優雅で芸術的な闘牛士の一人で、2026年には出場数で一時首位に立ちました。世界最大のスター、アンドレス・ロカ・レイはフェリア2度目の登場——唯一2日出場——で、勇気・支配力・電撃的魅力を大団円に捧げます。パンプローナでも何度もプエルタ・グランデを果たしています。トレド出身のトマス・ルフォが豪華なトリオを締めます。堅実で力強く、地位を固めつつあり、サンフェルミン近年の優勝者の一人です。ハンディーリャとベガエルモサと共に、7月14日はフェリアの掉尾を飾ります。"}}];

function detectLang(){
  try{var s=localStorage.getItem('pb_lang'); if(s&&I18N.nav_feria[s])return s;}catch(e){}
  var n=((navigator.language||'es').slice(0,2)).toLowerCase();
  return I18N.nav_feria[n]?n:'es';
}
var LANG=detectLang();
function t(k){var o=I18N[k];return o?(o[LANG]||o.es):k;}
function setLang(l){LANG=l;try{localStorage.setItem('pb_lang',l);}catch(e){} applyLang();}

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function poster(s){return String(s).split(/([ñÑ])/).map(function(p){return (p==='ñ'||p==='Ñ')?'<span style="font-family:var(--sans);font-weight:800">'+p+'</span>':esc(p);}).join('');}
function tmin(s){var m=String(s).match(/(\d{1,2}):(\d{2})/);return m?parseInt(m[1],10)*60+parseInt(m[2],10):9999;}
function todayISO(){return new Date(Date.now()+2*3600000).toISOString().slice(0,10);}

/* localized day fields */
function dGan(i){return LANG==='es'?DAYS[i].ganEssay:TR[i].gan[LANG];}
function dMat(i){return LANG==='es'?DAYS[i].matEssay:TR[i].mat[LANG];}
function dTags(i){return LANG==='es'?DAYS[i].ganTags:TR[i].tags[LANG];}
function dKindBase(i){var k=DAYS[i].kind;return k==='nov'?t('kind_nov'):(k==='rej'?t('kind_rej'):t('kind_corr'));}
function dKind(i){var b=dKindBase(i);return NOTEKEY[i]?b+' · '+t(NOTEKEY[i]):b;}
function dMatLabel(i){var k=DAYS[i].kind;return k==='nov'?t('lbl_novilleros'):(k==='rej'?t('lbl_rejoneadores'):t('lbl_matadores'));}
function dowShort(iso){return DOW[LANG][new Date(iso+'T12:00:00Z').getUTCDay()];}

/* attendees for day i from SEATS rows 0..6 (Peña) */
function attendees(i){
  var raw=[],free=0;
  for(var r=0;r<7;r++){var v=SEATS[r].cells[i]; if(v===''){free++;} else if(v!=='av'&&v!=='x'){raw.push(v);}}
  var seen={},order=[];
  raw.forEach(function(n){if(!(n in seen)){seen[n]=0;order.push(n);}seen[n]++;});
  var chips=order.map(function(n){return {name:n,count:seen[n]};});
  return {chips:chips,free:free};
}

var toastTm;
function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastTm);toastTm=setTimeout(function(){el.classList.remove('show');},2000);}
function copy(txt){if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(function(){toast(t('toast_copied'));});}else{var a=document.createElement('textarea');a.value=txt;a.style.opacity=0;document.body.appendChild(a);a.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(a);toast(t('toast_copied'));}}
window.copyTxt=copy;
window.toggleDay=function(i){var c=document.getElementById('day-'+i);if(c)c.classList.toggle('open');};

function tick(){
  var d=new Date(Date.now()+2*3600000);
  document.getElementById('clock').textContent=String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');
  var tdy=todayISO(),lbl=document.getElementById('day-label'),found=null;
  for(var i=0;i<DAYS.length;i++)if(DAYS[i].iso===tdy){found=DAYS[i];break;}
  if(found)lbl.textContent=t('dl_today')+' · '+found.num+' · '+found.ganName.split(' /')[0];
  else if(tdy<'2026-07-05'){var dd=Math.ceil((new Date('2026-07-05')-new Date(tdy))/86400000);lbl.textContent=dd>0?t('dl_countdown').replace('{n}',dd):t('dl_default');}
  else if(tdy>'2026-07-14')lbl.textContent=t('dl_after');
  else lbl.textContent=t('dl_default');
}

function mapActs(url,addr){
  return '<div class="acts">'
    +'<a class="act primary" href="'+url+'" target="_blank" rel="noopener">📍 '+t('act_map')+'</a>'
    +'<a class="act" href="https://maps.google.com/maps?daddr='+encodeURIComponent(addr)+'&dirflg=w" target="_blank" rel="noopener">🧭 '+t('act_go')+'</a>'
    +'<button class="act" onclick="copyTxt(\''+addr.replace(/'/g,"\\'")+'\')">⎘ '+t('act_copy')+'</button>'
    +'</div>';
}

function excBlock(i){
  var e=EXCURSIONS[i];
  var tel=e.tel.map(function(p){return '<a class="exc-tel" href="tel:'+p.replace(/\s/g,'')+'">'+esc(p)+'</a>';}).join('');
  return '<div class="blk exc"><div class="blk-head"><div class="blk-ico bi-exc">🎨</div>'
    +'<div class="blk-tt"><div class="blk-name">'+t('exc_title')+'</div>'
    +'<div class="blk-time"><b>'+t('exc_when')+'</b> · '+t('exc_dates')+'</div></div></div>'

    +'<div class="exc-show">'+t('exc_show')+'</div>'

    +'<div class="exc-transport">'+t('exc_transport')+'</div>'

}
function penyaStrip(i){
  var a=attendees(i);
  var h='<div class="penya-strip"><div class="ps-head"><div class="ps-ico">👥</div><div class="ps-title">'+t('penya_today')+'</div>';
  h+='<div class="ps-free">'+a.free+' '+t('penya_free')+'</div></div>';
  if(a.chips.length){
    h+='<div class="ps-people">'+a.chips.map(function(c){
      var label=esc(c.name)+(c.count>1?' ×'+c.count:'');
      return '<span class="av-chip"><span class="av-ini">'+esc(c.name.charAt(0).toUpperCase())+'</span>'+label+'</span>';
    }).join('')+'</div>';
  } else {
    h+='<div class="ps-none">'+t('penya_none')+'</div>';
  }
  h+='</div>';
  return h;
}

    +'<span class="h-chip gold">🐂 '+t('chip_corrida')+'</span>'
    +'<span class="h-chip">'+t('chip_count')+'</span>'
    +'</div></div></div>';
  h+='<div class="legend">'
    +'<span class="lg"><span class="lg-dot lg-corr"></span>'+t('leg_corr')+'</span>'
    +'<span class="lg"><span class="lg-dot lg-rej"></span>'+t('leg_rej')+'</span>'
    +'<span class="lg"><span class="lg-dot lg-nov"></span>'+t('leg_nov')+'</span>'
    +'<span class="lg"><span class="lg-dot lg-cena"></span>'+t('leg_cena')+'</span>'
    +'</div>';
  h+='<div class="sec-label">'+t('sec_program')+'</div>';

  DAYS.forEach(function(d,i){
    var isToday=d.iso===tdy,isPast=d.iso<tdy,open=isToday||(tdy<'2026-07-05'&&i===0);
    var kindCls=d.kind==='rej'?'k-rej':(d.kind==='nov'?'k-nov':'k-corr');
    h+='<div class="day'+(isToday?' today':'')+(isPast?' past':'')+(open?' open':'')+'" id="day-'+i+'" style="animation-delay:'+(i*.03).toFixed(2)+'s">';
    h+='<div class="day-head" onclick="toggleDay('+i+')">'
      +'<div class="day-date '+kindCls+'"><span class="dd-dow">'+esc(dowShort(d.iso))+'</span><span class="dd-num">'+d.num+'</span><span class="dd-mon">'+MON[LANG]+'</span></div>'
      +'<div class="day-head-main"><div class="dhm-tt">'
      +'<div class="dhm-kind">'+esc(dKind(i))+'</div>'
      +'<div class="dhm-gan">'+poster(d.ganName)+'</div>'
      +'<div class="dhm-meta">'+(isToday?'<span class="pill-today">'+t('dl_today')+'</span>':'')
      +'<span>🕛 13:00</span><span>·</span><span>🐂 '+d.corrTime+'</span>'
      +(d.cenas.length?'<span>·</span><span>🍴 '+d.cenas.length+'</span>':'')
      +(EXCURSIONS[i]?'<span>·</span><span>🎨</span>':'')
      +'</div></div></div><span class="chev">▾</span></div>';
    h+='<div class="day-body"><div class="day-body-in">';
    var parts=[];

    /* La Peña hoy (first) */
    parts.push({t:0, html: penyaStrip(i)});

    /* APARTADO 13:00 (doors 12:15) */
    parts.push({t:780, html:
      '<div class="blk"><div class="blk-head"><div class="blk-ico bi-apar">🕛</div>'
      +'<div class="blk-tt"><div class="blk-name">'+t('apartado')+'</div><div class="blk-time">'+t('apartado_sub')+'</div></div></div>'
      +'<div class="blk-body">'
      +'<div class="note">'+t('apartado_note')+' <b>'+t('apartado_price')+'</b></div>'
      +'<div class="where"><span class="pin">📍</span><span>'+t('plaza_name')+'</span></div>'
      +mapActs(PLAZA_URL,'Plaza de Toros de Pamplona')
      +'</div></div>' });

    /* CORRIDA → Ganadería + Matadores */
    parts.push({t:tmin(d.corrTime), html:
      '<div class="blk"><div class="blk-head"><div class="blk-ico bi-corr">🐂</div>'
      +'<div class="blk-tt"><div class="blk-name">'+esc(dKindBase(i))+'</div><div class="blk-time"><b>'+d.corrTime+'</b> · '+t('plaza_name').split(' (')[0]+'</div></div></div>'
      +'<div class="blk-body">'
      +'<div class="where"><span class="pin">📍</span><span>'+t('plaza_name')+'</span></div>'
      +mapActs(PLAZA_URL,'Plaza de Toros de Pamplona')
      +'<div class="blk" style="margin-top:13px"><div class="blk-head"><div class="blk-ico bi-gan">🐃</div>'
      +'<div class="blk-tt"><div class="blk-name">'+t('ganaderia')+' · '+esc(d.ganName)+'</div><div class="blk-time">'+t('hierro_tarde')+'</div></div></div>'
      +'<div class="blk-body"><div class="tag-row">'+dTags(i).map(function(x){return '<span class="tag gold">'+esc(x)+'</span>';}).join('')+'</div>'
      +'<div class="essay">'+dGan(i)+'</div></div></div>'
      +'<div class="blk" style="margin-top:11px"><div class="blk-head"><div class="blk-ico bi-mat">⚔️</div>'
      +'<div class="blk-tt"><div class="blk-name">'+dMatLabel(i)+'</div><div class="blk-time">'+t('la_terna')+'</div></div></div>'
      +'<div class="blk-body"><ul class="terna">'
      +d.terna.map(function(mm,k){return '<li><span class="tn">'+(k+1)+'</span><span class="tname">'+esc(mm[0])+'</span><span class="torigin">'+esc(mm[1])+'</span></li>';}).join('')
      +'</ul><div class="essay">'+dMat(i)+'</div></div></div>'
      +'</div></div>' });

    /* MEALS at their own time */
    d.cenas.forEach(function(c){
      var icon=c.breakfast?'☕':(c.lunch?'🍽️':'🍴');
      var label=c.breakfast?t('meal_breakfast'):(c.lunch?t('meal_lunch'):t('meal_dinner'));
      parts.push({t:tmin(c.time), html:
        '<div class="blk"><div class="blk-head"><div class="blk-ico bi-cena">'+icon+'</div>'
        +'<div class="blk-tt"><div class="blk-name">'+label+' · '+esc(c.name.replace('Desayuno · ','').replace(' · comida',''))+'</div>'
        +'<div class="blk-time"><b>'+esc(c.time)+'</b></div></div></div>'
        +'<div class="blk-body">'
        +'<div class="diners"><b>👥 </b>'+esc(c.pax)+'</div>'
        +'<div class="where"><span class="pin">📍</span><span>'+esc(c.addr)+'</span></div>'
        +mapActs(c.url,c.addr)
        +'</div></div>' });
    });

    /* EXCURSION (Carlos Ciriza) — día 11 */
    if(EXCURSIONS[i]) parts.push({t:tmin(EXCURSIONS[i].time), html:excBlock(i)});

    parts.sort(function(a,b){return a.t-b.t;});
    h+=parts.map(function(p){return p.html;}).join('');
    h+='</div></div></div>';
  });
  document.getElementById('tab-feria').innerHTML=h;
}

/* ── SEATING matrix ── */
function renderSeating(){
  var tdy=todayISO();
  var h='<div class="seat-card"><div class="seat-card-h"><h3>'+esc(t('seating_title'))+'</h3><div class="sub">'+esc(t('seating_sub'))+'</div></div>'
    +'<div class="seat-legend">'
    +'<span class="sl"><span class="sl-sw sl-occ"></span>'+t('seat_occ')+'</span>'
    +'<span class="sl"><span class="sl-sw sl-free"></span>'+t('seat_free')+'</span>'
    +'<span class="sl"><span class="sl-sw sl-av"></span>'+t('seat_avail')+'</span>'
    +'</div>';
  h+='<div class="seat-wrap"><table class="seat-grid"><thead><tr>'
    +'<th class="corner">'+t('col_abono')+'</th>';
  DAYS.forEach(function(d){
    var ist=d.iso===tdy;
    h+='<th class="dh'+(ist?' is-today':'')+'">'+d.num+'<small>'+esc(dowShort(d.iso))+'</small></th>';
  });
  h+='</tr></thead><tbody>';
  SEATS.forEach(function(s){
    var rowcls=s.kind==='avail'?'r-av':(s.kind==='occ'?'r-nap':'');
    h+='<tr><td class="seat-holder '+rowcls+'"><div class="sn">'+t('col_abono')+' '+s.n+'</div><div class="sh">'+esc(s.holder)+'</div></td>';
    s.cells.forEach(function(v,ci){
      if(v==='av') h+='<td class="seat-cell sc-av">✓</td>';
      else if(v==='x') h+='<td class="seat-cell sc-nap">Napardi</td>';
      else if(v==='') h+='<td class="seat-cell sc-free">·</td>';
      else h+='<td class="seat-cell sc-occ">'+esc(v)+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="seat-note">'+t('seating_note')+'</div></div>';
  return h;
}

/* ── language + tabs ── */
function applyLang(){
  document.documentElement.lang=LANG;
  window.__CARTELERR__=t('cartel_err');
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.dataset.lang===LANG);});
  ['feria','cartel','cenas','plaza'].forEach(function(n){
    var b=document.querySelector('.tab-btn[data-tab='+n+']'); if(b)b.textContent=t('nav_'+n);
  });
  renderFeria();renderCartel();renderCenas();renderPlaza();
  tick();
}

document.getElementById('tabs').addEventListener('click',function(e){
  var b=e.target.closest('.tab-btn');if(!b)return;var n=b.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.toggle('active',x.dataset.tab===n);});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('active',p.id==='tab-'+n);});
  document.getElementById('main').scrollTo({top:0,behavior:'smooth'});
});
document.getElementById('langbar').addEventListener('click',function(e){
  var b=e.target.closest('.lang-btn');if(!b)return;setLang(b.dataset.lang);
});

function init(){
  document.getElementById('hdr-mono').src=PB_MONO;
  document.getElementById('pb-full').src=PB_FULL;
  applyLang();
  setInterval(tick,1000);
  var hdr=document.getElementById('app-header'),mn=document.getElementById('main');
  function offset(){mn.style.paddingTop=hdr.offsetHeight+'px';}
  offset();window.addEventListener('resize',offset);
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
window.addEventListener('unhandledrejection',function(e){e.preventDefault();});

</script>
